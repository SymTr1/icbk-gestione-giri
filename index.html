<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICBK - Gestione Giri Consegne</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3345;
  --text: #e4e6ef; --text2: #9298b0; --accent: #4f8cff; --accent2: #3a6fd8;
  --green: #34d399; --red: #f87171; --orange: #fb923c;
  --np-bg: #2d1f3d; --np-text: #c084fc; --sede-color: #38bdf8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:13px; }

.header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:700; white-space:nowrap; }
.header h1 span { color:var(--accent); }
.header-stats { display:flex; gap:14px; margin-left:auto; font-size:12px; flex-wrap:wrap; }
.header-stat { display:flex; align-items:center; gap:4px; color:var(--text2); white-space:nowrap; }
.header-stat strong { color:var(--text); font-size:14px; }

.upload-area { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:40px; }
.upload-box { border:2px dashed var(--border); border-radius:16px; padding:60px 80px; text-align:center; cursor:pointer; transition:all .2s; background:var(--surface); }
.upload-box:hover,.upload-box.dragover { border-color:var(--accent); background:var(--surface2); }
.upload-box svg { width:48px; height:48px; color:var(--accent); margin-bottom:16px; }
.upload-box h2 { font-size:18px; margin-bottom:8px; }
.upload-box p { color:var(--text2); font-size:14px; }
.api-key-section { margin-top:20px; text-align:center; }
.api-key-section input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:8px; font-size:12px; width:380px; }
.api-key-section label { display:block; color:var(--text2); font-size:12px; margin-bottom:6px; }

.main { display:none; }
.main.active { display:block; }

.tabs { display:flex; gap:0; background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; position:sticky; top:49px; z-index:90; }
.tab { padding:10px 20px; cursor:pointer; color:var(--text2); font-size:13px; font-weight:500; border-bottom:2px solid transparent; transition:all .15s; user-select:none; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.toolbar { display:flex; gap:10px; padding:12px 20px; flex-wrap:wrap; align-items:center; background:var(--surface); border-bottom:1px solid var(--border); }
.toolbar input[type="text"] { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; font-size:12px; width:240px; }
.btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; cursor:pointer; transition:all .15s; }
.btn:hover { border-color:var(--accent); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }

.tab-panel { display:none; }
.tab-panel.active { display:block; }

.map-wrapper { height:500px; position:relative; }
#mapConsegne,#mapZone { width:100%; height:100%; }

/* ZONE HEADER */
.zone-table-header { background:var(--surface); padding:10px 20px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); border-top:1px solid var(--border); cursor:pointer; user-select:none; flex-wrap:wrap; }
.zone-table-header:hover { background:var(--surface2); }
.zone-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.zone-title { font-weight:700; font-size:14px; }
.zone-badge { background:var(--surface2); padding:2px 10px; border-radius:12px; font-size:11px; color:var(--text2); }
.zone-cargo { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-left:12px; font-size:12px; }
.zone-cargo .cargo-item { background:var(--surface2); padding:2px 8px; border-radius:4px; color:var(--text); font-weight:500; white-space:nowrap; }
.zone-cargo .cargo-weight { background:rgba(79,140,255,0.15); color:var(--accent); padding:2px 10px; border-radius:4px; font-weight:600; white-space:nowrap; }
.chevron { transition:transform .2s; font-size:14px; color:var(--text2); margin-left:auto; flex-shrink:0; }
.zone-table-header.collapsed .chevron { transform:rotate(-90deg); }
.zone-table-content.collapsed { display:none; }

.zone-section.sede-zone .zone-table-header { background:rgba(56,189,248,0.08); }
.zone-section.sede-zone .zone-title { color:var(--sede-color); }
.zone-section.unassigned .zone-table-header { background:rgba(248,113,113,0.08); }
.zone-section.drag-target .zone-table-header { background:rgba(79,140,255,0.15); border-color:var(--accent); }

/* TABLE */
.orders-table { width:100%; border-collapse:collapse; }
.orders-table th { background:var(--surface2); padding:6px 10px; text-align:left; font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
.orders-table td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.orders-table tr:hover td { background:var(--surface2); }
.orders-table tr[draggable="true"] { cursor:grab; }
.orders-table tr.dragging td { opacity:.4; }

.col-num { width:36px; text-align:center; color:var(--text2); }
.col-customer { min-width:140px; max-width:220px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.col-products { min-width:220px; }
.col-address { min-width:160px; max-width:260px; color:var(--text2); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.col-notes { min-width:80px; max-width:180px; }
.col-amount { width:80px; text-align:right; font-weight:600; white-space:nowrap; }

.product-item { display:inline; font-size:12px; white-space:nowrap; font-weight:500; }
.product-bracket { color:var(--accent); font-weight:700; }
.product-plus { color:var(--text2); margin:0 3px; }

.notes-text { font-size:11px; color:var(--orange); font-style:italic; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-badge { display:inline-block; background:var(--np-bg); color:var(--np-text); padding:1px 8px; border-radius:4px; font-size:11px; font-weight:600; }

/* Loading / Toast */
.loading-overlay { display:none; position:fixed; inset:0; background:rgba(15,17,23,.85); z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.loading-overlay.active { display:flex; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--text2); font-size:14px; }
.loading-progress { color:var(--text); font-size:13px; font-weight:500; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:13px; z-index:300; transform:translateY(100px); opacity:0; transition:all .3s; }
.toast.show { transform:translateY(0); opacity:1; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.leaflet-popup-content { font-size:12px; line-height:1.5; }
.popup-title { font-weight:700; font-size:13px; margin-bottom:4px; }
.popup-product { display:block; font-size:12px; color:#555; padding:1px 0; }
.popup-product b { color:#222; }
.popup-address { font-size:11px; color:#888; margin-top:6px; border-top:1px solid #eee; padding-top:4px; }
.popup-np { color:#9333ea; font-weight:700; }
.popup-amount { font-weight:600; margin-top:4px; font-size:13px; }
.popup-zone { font-size:11px; color:#666; margin-top:2px; }

@media print {
  .header,.tabs,.toolbar,.upload-area,.map-wrapper,.btn { display:none !important; }
  .main,.tab-panel { display:block !important; }
  body { background:#fff; color:#000; font-size:10px; }
  .orders-table th { background:#eee !important; color:#000 !important; }
  .orders-table td { color:#000 !important; border-color:#ccc !important; }
  .zone-table-header { background:#f5f5f5 !important; color:#000 !important; }
  .product-bracket { color:#333 !important; }
}
</style>
</head>

function isSedeAddress(addr) {

  if (/via\s+(eugenio\s+)?montale\s+(27|29)/i.test(a)) return true;
  return false;
}

// ============================================================
// CSV PARSING
// ============================================================
function parseCSV(text) {
  var lines=[], current='', inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(ch==='"')inQ=!inQ;
    if((ch==='\n'||ch==='\r')&&!inQ){if(current.trim())lines.push(current);current='';if(ch==='\r'&&text[i+1]==='\n')i++;}
    else current+=ch;
  }
  if(current.trim())lines.push(current);

  var results=[];
  for(var idx=1;idx<lines.length;idx++){
    var fields=splitCSV(lines[idx],';');
    if(fields.length<9)continue;

    var products=[];
    try{products=JSON.parse(fields[2].replace(/""/g,'"'));}
    catch(e1){try{products=JSON.parse(fields[2]);}catch(e2){try{products=JSON.parse(fields[2].replace(/^"|"$/g,'').replace(/""/g,'"'));}catch(e3){}}}

    var displayProducts=[];
    for(var pi=0;pi<products.length;pi++){
      var p=products[pi];
      if(SERVICE_PRODUCTS.has(p.name))continue;
      var isPoli=POLIBOX_PRODUCTS.has(p.name);
      var step=PRODUCT_STEPS[p.name]||1;
      var colli=Math.ceil(p.quantity/step);
      displayProducts.push({
        name:p.name, quantity:p.quantity,
        abbr:PRODUCT_ABBREVIATIONS[p.name]||p.name,
        step:step, colli:colli, isPoli:isPoli
      });
    }

    var customer=fields[1].trim();
    var address=(fields[4]||'').trim();
    var forcedZone=isSedeAddress(address)?SEDE_ZONE:null;

    results.push({
      id:fields[0], customer:customer, products:displayProducts,
      date:fields[3], address:address, contact:(fields[5]||'').trim(),
      instructions:(fields[6]||'').trim(), note:(fields[7]||'').trim(),
      total:parseFloat(fields[8])||0,
      isNP:NP_CLIENTS.has(customer.toUpperCase()),
      zone:forcedZone, lat:null, lng:null, isSede:!!forcedZone
    });
  }
  return results;
}

function splitCSV(line,sep){
  var fields=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===sep&&!inQ){fields.push(cur);cur='';}else cur+=ch;}
  fields.push(cur);return fields;
}

function calcZoneCargo(zoneOrders) {
  var productTotals={}, totalColli=0, totalKg=0, totalPoli=0;
  zoneOrders.forEach(function(o){
    o.products.forEach(function(p){
      if(!productTotals[p.abbr]) productTotals[p.abbr]={qty:0,colli:0,isPoli:p.isPoli};
      productTotals[p.abbr].qty+=p.quantity;
      productTotals[p.abbr].colli+=p.colli;
      if(p.isPoli){totalPoli+=p.quantity;}
      else{totalColli+=p.colli; totalKg+=p.colli*10;}
    });
  });
  return {productTotals:productTotals, totalColli:totalColli, totalKg:totalKg, totalPoli:totalPoli};
}

// ============================================================
// GEOCODING (Nominatim + Google Maps fallback)
// ============================================================
function geocodeNominatim(address){
  var cleanAddr=address.replace(/\(MI\)/gi,'Milano').replace(/\(Milano\)/gi,'Milano')
    .replace(/, undefined/gi,'').replace(/undefined/gi,'')
    .replace(/Metropolitan City of Milan, Italy/gi,'')
    .trim().replace(/,\s*,/g,',').replace(/,\s*$/,'');
  if(!/milano|milan/i.test(cleanAddr)&&!/novegro|peschiera|melegnano|segrate|opera/i.test(cleanAddr))cleanAddr+=', Milano, Italy';
  else if(!/italy|italia/i.test(cleanAddr))cleanAddr+=', Italy';
  return fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(cleanAddr)+'&limit=1&countrycodes=it',{headers:{'User-Agent':'ICBK/1.0'}})
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.length>0)return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};return null;})
    .catch(function(){return null;});
}

function geocodeGoogle(address){
  if(!googleApiKey)return Promise.resolve(null);
  var cleanAddr=address.replace(/\(MI\)/gi,'Milano').replace(/\(Milano\)/gi,'Milano')
    .replace(/, undefined/gi,'').replace(/undefined/gi,'')
    .replace(/Metropolitan City of Milan, Italy/gi,'').trim();
  if(!/milano|milan/i.test(cleanAddr))cleanAddr+=', Milano, Italy';
  return fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(cleanAddr)+'&key='+googleApiKey+'&region=it')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.status==='OK'&&d.results.length>0){
        var loc=d.results[0].geometry.location;
        return{lat:loc.lat,lng:loc.lng};
      }
      return null;
    }).catch(function(){return null;});
}

function geocodeAddress(address){
  var cacheKey=address.toLowerCase().trim();
  if(geocodeCache[cacheKey])return Promise.resolve(geocodeCache[cacheKey]);
  return geocodeNominatim(address).then(function(result){
    if(result){geocodeCache[cacheKey]=result;try{localStorage.setItem('icbk_geocode_cache',JSON.stringify(geocodeCache));}catch(e){}return result;}
    // Fallback to Google
    return geocodeGoogle(address).then(function(gResult){
      if(gResult){geocodeCache[cacheKey]=gResult;try{localStorage.setItem('icbk_geocode_cache',JSON.stringify(geocodeCache));}catch(e){}return gResult;}
      return null;
    });
  });
}

function pointInPolygon(lng,lat,poly){var inside=false;for(var i=0,j=poly.length-1;i<poly.length;j=i++){var xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;}return inside;}
function findZone(lng,lat){for(var i=0;i<ZONES.length;i++){if(pointInPolygon(lng,lat,ZONES[i].polygon))return ZONES[i].name;}return null;}

function el(tag,attrs,children){var e=document.createElement(tag);if(attrs)Object.keys(attrs).forEach(function(k){if(k==='className')e.className=attrs[k];else if(k==='textContent')e.textContent=attrs[k];else if(k.indexOf('on')===0)e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);else if(k==='style'&&typeof attrs[k]==='object')Object.assign(e.style,attrs[k]);else e.setAttribute(k,attrs[k]);});if(children){if(typeof children==='string')e.textContent=children;else if(Array.isArray(children))children.forEach(function(c){if(c)e.appendChild(c);});}return e;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function escTxt(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// FORMAT PRODUCTS: [100 x G] + [5 x Poli]

function formatProductsDOM(products) {
  var frag = document.createDocumentFragment();
  products.forEach(function(p, i) {
    if (i > 0) frag.appendChild(el('span', {className:'product-plus'}, '+'));
    var span = el('span', {className:'product-item'});
    span.appendChild(el('span', {className:'product-bracket'}, '['));
    span.appendChild(document.createTextNode(p.quantity + ' x ' + p.abbr));
    span.appendChild(el('span', {className:'product-bracket'}, ']'));
    frag.appendChild(span);
  });
  return frag;
}

function renderZones(containerId, filter) {
  filter=(filter||'').toLowerCase();
  var container=document.getElementById(containerId);
  while(container.firstChild)container.removeChild(container.firstChild);

  var grouped={}, unassigned=[];
  orders.forEach(function(order){
    if(filter){var s=(order.customer+' '+order.address+' '+order.products.map(function(p){return p.abbr;}).join(' ')).toLowerCase();if(s.indexOf(filter)===-1)return;}
    if(order.zone){if(!grouped[order.zone])grouped[order.zone]=[];grouped[order.zone].push(order);}
    else unassigned.push(order);
  });

  if(grouped[SEDE_ZONE]){container.appendChild(buildZoneSection(SEDE_ZONE,grouped[SEDE_ZONE],ZONE_COLORS[SEDE_ZONE],false,true));delete grouped[SEDE_ZONE];}

  var zoneOrder=ZONES.map(function(z){return z.name;});
  Object.keys(grouped).sort(function(a,b){return(zoneOrder.indexOf(a)===-1?999:zoneOrder.indexOf(a))-(zoneOrder.indexOf(b)===-1?999:zoneOrder.indexOf(b));})
    .forEach(function(zn){container.appendChild(buildZoneSection(zn,grouped[zn],ZONE_COLORS[zn]||'#666',false,false));});

  if(unassigned.length>0)container.appendChild(buildZoneSection('NON ASSEGNATI',unassigned,'#f87171',true,false));

  updateHeaderStats();
  attachDrag();
}

function buildZoneSection(zoneName, zoneOrders, color, isUnassigned, isSede) {
  var cls='zone-section';
  if(isUnassigned)cls+=' unassigned';
  if(isSede)cls+=' sede-zone';
  var section=el('div',{className:cls,'data-zone':zoneName});

  var cargo=calcZoneCargo(zoneOrders);

  // Header with full cargo info
  var header=el('div',{className:'zone-table-header',onClick:function(){
    this.classList.toggle('collapsed');
    var next=this.nextElementSibling;
    while(next&&next.classList.contains('zone-table-content')){next.classList.toggle('collapsed');next=next.nextElementSibling;}
  }});
  header.appendChild(el('div',{className:'zone-dot',style:{background:color}}));
  header.appendChild(el('span',{className:'zone-title',textContent:zoneName}));
  header.appendChild(el('span',{className:'zone-badge',textContent:zoneOrders.length+' consegne'}));

  // Cargo items in header
  var cargoDiv=el('div',{className:'zone-cargo'});
  Object.keys(cargo.productTotals).forEach(function(abbr){
    var pt=cargo.productTotals[abbr];
    cargoDiv.appendChild(el('span',{className:'cargo-item',textContent:pt.qty+' x '+abbr}));
  });
  // Weight summary
  var weightText='Colli: '+cargo.totalColli+' ('+cargo.totalKg+' kg)';
  if(cargo.totalPoli>0) weightText+=' + '+cargo.totalPoli+' Polibox';
  cargoDiv.appendChild(el('span',{className:'cargo-weight',textContent:weightText}));
  header.appendChild(cargoDiv);

  header.appendChild(el('span',{className:'chevron',textContent:'\u25BC'}));
  section.appendChild(header);

  // Table
  var tableWrap=el('div',{className:'zone-table-content'});
  var table=el('table',{className:'orders-table'});
  var thead=el('thead');
  var headRow=el('tr');
  [{t:'#',c:'col-num'},{t:'Cliente',c:'col-customer'},{t:'Prodotti',c:'col-products'},{t:'Indirizzo',c:'col-address'},{t:'Note',c:'col-notes'},{t:'Importo',c:'col-amount'}]
    .forEach(function(h){headRow.appendChild(el('th',{className:h.c,textContent:h.t}));});
  thead.appendChild(headRow);
  table.appendChild(thead);

  var tbody=el('tbody');
  zoneOrders.forEach(function(order,idx){
    var tr=el('tr',{draggable:'true','data-order-id':order.id,'data-zone':zoneName});
    tr.appendChild(el('td',{className:'col-num',textContent:String(idx+1)}));
    tr.appendChild(el('td',{className:'col-customer',title:order.customer,textContent:order.customer}));

    var prodTd=el('td',{className:'col-products'});
    if(order.products.length===0)prodTd.appendChild(el('span',{style:{color:'var(--red)',fontSize:'11px'}},'(nessun prodotto)'));
    else prodTd.appendChild(formatProductsDOM(order.products));
    tr.appendChild(prodTd);

    tr.appendChild(el('td',{className:'col-address',title:order.address,textContent:order.address}));

    var noteTd=el('td',{className:'col-notes'});
    var noteText=order.instructions||order.note;
    if(noteText)noteTd.appendChild(el('span',{className:'notes-text',title:noteText,textContent:noteText}));
    tr.appendChild(noteTd);

    var amtTd=el('td',{className:'col-amount'});
    if(order.isNP)amtTd.appendChild(el('span',{className:'np-badge',textContent:'NP'}));
    else amtTd.textContent='\u20AC'+order.total.toFixed(2);
    tr.appendChild(amtTd);

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  section.appendChild(tableWrap);
  return section;
}

  orders.forEach(function(o){o.products.forEach(function(p){totalPieces+=p.quantity;if(p.isPoli)totalPoli+=p.quantity;else{totalColli+=p.colli;totalKg+=p.colli*10;}});});
  var zonesSet={};orders.forEach(function(o){if(o.zone)zonesSet[o.zone]=true;});
  [[orders.length,'ordini'],[orders.filter(function(o){return o.zone&&o.zone!==SEDE_ZONE;}).length,'in consegna'],[orders.filter(function(o){return o.isSede;}).length,'ritiri sede'],[totalColli,'colli ('+totalKg+'kg)'],[totalPoli,'polibox'],[orders.filter(function(o){return o.isNP;}).length,'NP']]

}

function initMapConsegne(){if(mapConsegne)return;mapConsegne=L.map('mapConsegne').setView([45.464,9.19],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(mapConsegne);}
function initMapZone(){if(mapZone)return;mapZone=L.map('mapZone').setView([45.464,9.19],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(mapZone);ZONES.forEach(function(z){L.polygon(z.polygon.map(function(p){return[p[1],p[0]];}),{color:z.color,weight:2,fillOpacity:.15}).addTo(mapZone).bindTooltip(z.name,{permanent:false,direction:'center'});});}

function refreshMapMarkers(map,arr){
  arr.forEach(function(m){map.removeLayer(m);});arr.length=0;
  orders.forEach(function(order){
    if(!order.lat||!order.lng)return;
    // Color = zone the order is ASSIGNED to (not geographic zone)
    var zoneColor=order.zone?(ZONE_COLORS[order.zone]||'#4f8cff'):'#f87171';
    var marker=L.circleMarker([order.lat,order.lng],{radius:7,color:'#fff',weight:2,fillColor:zoneColor,fillOpacity:.9}).addTo(map);
    marker.bindPopup(buildPopupContent(order),{maxWidth:300});
    arr.push(marker);
  });
}

// ============================================================
// DRAG & DROP
// ============================================================
var draggedOrderId=null;
function attachDrag(){
  document.querySelectorAll('.orders-table tr[draggable]').forEach(function(row){
    row.addEventListener('dragstart',function(e){draggedOrderId=this.getAttribute('data-order-id');this.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.zone-section').forEach(function(s){s.classList.remove('drag-target');});});
  });
  document.querySelectorAll('.zone-section').forEach(function(section){
    section.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';section.classList.add('drag-target');});
    section.addEventListener('dragleave',function(){section.classList.remove('drag-target');});
    section.addEventListener('drop',function(e){
      e.preventDefault();section.classList.remove('drag-target');
      var tz=section.getAttribute('data-zone');if(!draggedOrderId||!tz)return;
      var order=orders.find(function(o){return o.id===draggedOrderId;});
      if(order){var old=order.zone||'NON ASSEGNATI';order.zone=tz==='NON ASSEGNATI'?null:tz;order.isSede=(order.zone===SEDE_ZONE);renderAll();showToast(order.customer+': '+old+' \u2192 '+tz);}
      draggedOrderId=null;
    });
  });
}

function renderAll(){var f=document.getElementById('searchInput').value;renderZones('zonesContainer',f);renderZones('zonesContainerMap',f);if(mapConsegne)refreshMapMarkers(mapConsegne,mapConsegneMarkers);if(mapZone)refreshMapMarkers(mapZone,mapZoneMarkers);}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(function(tab){tab.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  this.classList.add('active');document.getElementById('panel-'+this.getAttribute('data-tab')).classList.add('active');
  if(this.getAttribute('data-tab')==='mapConsegne'){initMapConsegne();setTimeout(function(){mapConsegne.invalidateSize();refreshMapMarkers(mapConsegne,mapConsegneMarkers);},100);}
  if(this.getAttribute('data-tab')==='mapZone'){initMapZone();setTimeout(function(){mapZone.invalidateSize();refreshMapMarkers(mapZone,mapZoneMarkers);},100);}
});});

// ============================================================
// TOOLBAR
// ============================================================
document.getElementById('searchInput').addEventListener('input',function(){renderAll();});
document.getElementById('btnExpand').addEventListener('click',function(){document.querySelectorAll('.zone-table-content.collapsed').forEach(function(e){e.classList.remove('collapsed');});document.querySelectorAll('.zone-table-header.collapsed').forEach(function(e){e.classList.remove('collapsed');});});
document.getElementById('btnCollapse').addEventListener('click',function(){document.querySelectorAll('.zone-table-content').forEach(function(e){e.classList.add('collapsed');});document.querySelectorAll('.zone-table-header').forEach(function(e){e.classList.add('collapsed');});});
document.getElementById('btnPrint').addEventListener('click',function(){window.print();});
document.getElementById('btnExport').addEventListener('click',function(){
  var csv='Zona;#;Cliente;Prodotti;Quantita;Colli;Kg;Indirizzo;Importo;Note\n';
  var sorted=orders.slice().sort(function(a,b){return(a.zone||'ZZZ').localeCompare(b.zone||'ZZZ');});
  var zi={};sorted.forEach(function(o){var z=o.zone||'N/A';if(!zi[z])zi[z]=0;zi[z]++;
    var prods=o.products.map(function(p){return'['+p.quantity+' x '+p.abbr+']';}).join(' + ');
    var colli=o.products.reduce(function(s,p){return s+(p.isPoli?0:p.colli);},0);
    var kg=colli*10;
    var poli=o.products.reduce(function(s,p){return s+(p.isPoli?p.quantity:0);},0);
    var kgStr=kg+'kg'+(poli>0?' + '+poli+' polibox':'');
    csv+=z+';'+zi[z]+';'+o.customer+';'+prods+';'+o.products.reduce(function(s,p){return s+p.quantity;},0)+';'+colli+';'+kgStr+';'+o.address+';'+(o.isNP?'NP':o.total.toFixed(2))+';'+(o.instructions||o.note)+'\n';
  });
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=el('a',{href:URL.createObjectURL(blob),download:'giri_'+new Date().toISOString().slice(0,10)+'.csv'});
  document.body.appendChild(a);a.click();document.body.removeChild(a);
});
document.getElementById('btnReset').addEventListener('click',function(){
  orders=[];document.getElementById('mainView').classList.remove('active');document.getElementById('uploadArea').style.display='';
  if(mapConsegne){mapConsegne.remove();mapConsegne=null;}if(mapZone){mapZone.remove();mapZone=null;}mapConsegneMarkers=[];mapZoneMarkers=[];
});

// ============================================================
// FILE UPLOAD & PROCESSING
// ============================================================
var uploadBox=document.getElementById('uploadBox');
var fileInput=document.getElementById('fileInput');
uploadBox.addEventListener('click',function(){fileInput.click();});
uploadBox.addEventListener('dragover',function(e){e.preventDefault();uploadBox.classList.add('dragover');});
uploadBox.addEventListener('dragleave',function(){uploadBox.classList.remove('dragover');});
uploadBox.addEventListener('drop',function(e){e.preventDefault();uploadBox.classList.remove('dragover');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',function(e){if(e.target.files[0])processFile(e.target.files[0]);});

function processFile(file){
  googleApiKey=(document.getElementById('googleApiKey').value||'').trim();
  file.text().then(function(text){
    orders=parseCSV(text);
    if(orders.length===0){showToast('Nessun ordine trovato');return;}

    console.log('Parsed '+orders.length+' ordini. Esempio:',JSON.stringify(orders[0],null,2));

    document.getElementById('uploadArea').style.display='none';
    document.getElementById('mainView').classList.add('active');
    var overlay=document.getElementById('loadingOverlay');
    overlay.classList.add('active');

    var total=orders.length, idx=0, failedGeo=[];

    function nextOrder(){
      if(idx>=orders.length){
        // Second pass: retry failed with Google if key available
        if(failedGeo.length>0&&googleApiKey){
          document.getElementById('loadingText').textContent='Google Maps fallback...';
          var gi=0;
          function nextGoogle(){
            if(gi>=failedGeo.length){finishLoading();return;}
            document.getElementById('loadingProgress').textContent=(gi+1)+' / '+failedGeo.length+' (Google)';
            var o=failedGeo[gi];
            geocodeGoogle(o.address).then(function(result){
              if(result){o.lat=result.lat;o.lng=result.lng;o.zone=findZone(result.lng,result.lat);
                geocodeCache[o.address.toLowerCase().trim()]=result;
                try{localStorage.setItem('icbk_geocode_cache',JSON.stringify(geocodeCache));}catch(e){}
              }
              gi++;setTimeout(nextGoogle,200);
            });
          }
          nextGoogle();
        } else { finishLoading(); }
        return;
      }
      document.getElementById('loadingProgress').textContent=(idx+1)+' / '+total;
      var o=orders[idx];
      if(o.isSede){idx++;nextOrder();return;}
      var wasCached=!!geocodeCache[o.address.toLowerCase().trim()];
      geocodeAddress(o.address).then(function(result){
        if(result){o.lat=result.lat;o.lng=result.lng;o.zone=findZone(result.lng,result.lat);}
        else{failedGeo.push(o);}
        idx++;wasCached?nextOrder():setTimeout(nextOrder,1100);
      });
    }

    function finishLoading(){
      overlay.classList.remove('active');
      document.getElementById('loadingText').textContent='Geocoding indirizzi...';
      renderAll();
      var assigned=orders.filter(function(o){return o.zone;}).length;
      var sede=orders.filter(function(o){return o.isSede;}).length;
      var noGeo=orders.filter(function(o){return!o.lat&&!o.isSede;}).length;
      var msg=orders.length+' ordini | '+assigned+' assegnati | '+sede+' ritiri sede';
      if(noGeo>0)msg+=' | '+noGeo+' senza coordinate';
      showToast(msg);
    }

    nextOrder();
  });
}
</script>
