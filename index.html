<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICBK - Gestione Giri Consegne</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6ef;
  --text2: #9298b0;
  --accent: #4f8cff;
  --accent2: #3a6fd8;
  --green: #34d399;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --np-bg: #2d1f3d;
  --np-text: #c084fc;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-stats {
  display: flex;
  gap: 20px;
  margin-left: auto;
  font-size: 13px;
}
.header-stat { display: flex; align-items: center; gap: 6px; color: var(--text2); }
.header-stat strong { color: var(--text); font-size: 15px; }

.upload-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  padding: 40px;
}
.upload-box {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 60px 80px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--surface);
}
.upload-box:hover, .upload-box.dragover {
  border-color: var(--accent);
  background: var(--surface2);
}
.upload-box svg { width: 48px; height: 48px; color: var(--accent); margin-bottom: 16px; }
.upload-box h2 { font-size: 18px; margin-bottom: 8px; }
.upload-box p { color: var(--text2); font-size: 14px; }

.main { display: none; padding: 20px; }
.main.active { display: block; }

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar input[type="text"] {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  width: 260px;
}
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }

.zones-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 16px;
}

.zone-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.zone-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.zone-header:hover { background: var(--surface2); }
.zone-color {
  width: 14px; height: 14px;
  border-radius: 4px;
  flex-shrink: 0;
}
.zone-name { font-weight: 600; font-size: 14px; flex: 1; }
.zone-badge {
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

.zone-summary {
  padding: 10px 18px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: rgba(79, 140, 255, 0.03);
}
.zone-summary-item {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.zone-summary-item strong { color: var(--text); font-size: 13px; }

.zone-orders { max-height: 500px; overflow-y: auto; }

.order-row {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  display: grid;
  grid-template-columns: 1fr 2fr 1.5fr 80px;
  gap: 8px;
  align-items: center;
  transition: background .1s;
  cursor: grab;
}
.order-row:hover { background: var(--surface2); }
.order-row.dragging { opacity: 0.4; background: var(--surface2); }
.order-row.drag-over { border-top: 2px solid var(--accent); }

.order-customer {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-products {
  color: var(--text2);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-address {
  color: var(--text2);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-amount {
  text-align: right;
  font-weight: 600;
  font-size: 13px;
}
.order-amount.np {
  color: var(--np-text);
  background: var(--np-bg);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 12px;
  text-align: center;
}

.order-notes {
  font-size: 11px;
  color: var(--orange);
  margin-top: 2px;
  font-style: italic;
}

.zone-card.drag-target { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,140,255,0.3); }

.unassigned-zone .zone-header { background: rgba(248,113,113,0.1); }
.unassigned-zone .zone-color { background: var(--red) !important; }

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,17,23,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text2); font-size: 14px; }
.loading-progress { color: var(--text); font-size: 13px; font-weight: 500; }

/* Map panel */
.map-panel {
  display: none;
  margin-bottom: 20px;
}
.map-panel.active { display: block; }
.map-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  height: 450px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text);
  z-index: 300;
  transform: translateY(100px);
  opacity: 0;
  transition: all .3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* Zone collapsed */
.zone-orders.collapsed { display: none; }
.zone-summary.collapsed { display: none; }
.zone-header .chevron { transition: transform .2s; font-size: 18px; color: var(--text2); }
.zone-header.collapsed .chevron { transform: rotate(-90deg); }

.product-tag {
  display: inline-block;
  background: var(--surface2);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
}

/* Print styles */
@media print {
  .header, .toolbar, .upload-area, .map-panel, .btn { display: none !important; }
  .main { display: block !important; padding: 0; }
  .zones-grid { display: block; }
  .zone-card { break-inside: avoid; margin-bottom: 12px; border: 1px solid #ccc; }
  .zone-orders { max-height: none; }
  body { background: #fff; color: #000; }
  .zone-header, .zone-summary, .order-row { background: #fff !important; color: #000 !important; }
  .order-products, .order-address, .zone-summary-item { color: #444 !important; }
}
</style>
</head>

// ============================================================
// CSV PARSING
// ============================================================
function parseCSV(text) {
  var lines = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '"') {
      if (text[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (current.trim()) lines.push(current);
      current = '';
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  if (current.trim()) lines.push(current);

  var results = [];
  for (var idx = 1; idx < lines.length; idx++) {
    var fields = splitCSVLine(lines[idx], ';');
    if (fields.length < 9) continue;

    var id = fields[0];
    var customer = fields[1];
    var productsRaw = fields[2];
    var date = fields[3];
    var address = fields[4];
    var contact = fields[5];
    var instructions = fields[6];
    var note = fields[7];
    var totalStr = fields[8];

    var products = [];
    try {
      var cleaned = productsRaw.replace(/""/g, '"').replace(/^"|"$/g, '');
      products = JSON.parse(cleaned);
    } catch(e) {
      try { products = JSON.parse(productsRaw); } catch(e2) {}
    }

    var displayProducts = products
      .filter(function(p) { return p.name !== 'servizio di consegna'; })
      .map(function(p) {
        return {
          id: p.id,
          name: p.name,
          quantity: p.quantity,
          base_price: p.base_price,
          net_price: p.net_price,
          abbr: PRODUCT_ABBREVIATIONS[p.name] || p.name
        };
      });

    var isNP = NP_CLIENTS.has(customer.trim().toUpperCase());
    var total = parseFloat(totalStr) || 0;

    results.push({
      id: id,
      customer: customer.trim(),
      products: displayProducts,
      allProducts: products,
      date: date,
      address: address.trim(),
      contact: (contact || '').trim(),
      instructions: (instructions || '').trim(),
      note: (note || '').trim(),
      total: total,
      isNP: isNP,
      zone: null,
      lat: null,
      lng: null
    });
  }
  return results;
}

function splitCSVLine(line, sep) {
  var fields = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === sep && !inQuotes) {
      fields.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  fields.push(current);
  return fields;
}

// ============================================================
// GEOCODING (Nominatim)
// ============================================================
function geocodeAddress(address) {
  var cacheKey = address.toLowerCase().trim();
  if (geocodeCache[cacheKey]) return Promise.resolve(geocodeCache[cacheKey]);

  var cleanAddr = address
    .replace(/\(MI\)/gi, 'Milano')
    .replace(/\(Milano\)/gi, 'Milano')
    .replace(/, undefined/gi, '')
    .replace(/undefined/gi, '')
    .replace(/Metropolitan City of Milan, Italy/gi, '')
    .trim()
    .replace(/,\s*,/g, ',')
    .replace(/,\s*$/,'');

  if (!/milano|milan/i.test(cleanAddr) && !/novegro|peschiera|melegnano|segrate/i.test(cleanAddr)) {
    cleanAddr += ', Milano, Italy';
  } else if (!/italy|italia/i.test(cleanAddr)) {
    cleanAddr += ', Italy';
  }

  var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(cleanAddr) + '&limit=1&countrycodes=it';
  return fetch(url, { headers: { 'User-Agent': 'ICBK-DeliveryManager/1.0' } })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      if (data && data.length > 0) {
        var result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        geocodeCache[cacheKey] = result;
        try { localStorage.setItem('icbk_geocode_cache', JSON.stringify(geocodeCache)); } catch(e) {}
        return result;
      }
      return null;
    })
    .catch(function(e) {
      console.warn('Geocoding failed for:', address, e);
      return null;
    });
}

// ============================================================
// POINT IN POLYGON
// ============================================================
function pointInPolygon(lng, lat, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i][0], yi = polygon[i][1];
    var xj = polygon[j][0], yj = polygon[j][1];
    var intersect = ((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function findZone(lng, lat) {
  for (var i = 0; i < ZONES.length; i++) {
    if (pointInPolygon(lng, lat, ZONES[i].polygon)) return ZONES[i].name;
  }
  return null;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.textContent;
}

function createEl(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(key) {
      if (key === 'className') el.className = attrs[key];
      else if (key === 'textContent') el.textContent = attrs[key];
      else if (key.startsWith('on')) el.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
      else if (key === 'style' && typeof attrs[key] === 'object') Object.assign(el.style, attrs[key]);
      else el.setAttribute(key, attrs[key]);
    });
  }
  if (children) {
    if (typeof children === 'string') el.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) el.appendChild(c); });
  }
  return el;
}

// ============================================================
// RENDERING (DOM-based, no innerHTML)
// ============================================================
function render(filter) {
  filter = filter || '';
  var grid = document.getElementById('zonesGrid');
  var filterLower = filter.toLowerCase();

  var grouped = {};
  var unassigned = [];

  for (var i = 0; i < orders.length; i++) {
    var order = orders[i];
    if (filterLower) {
      var searchable = (order.customer + ' ' + order.address + ' ' + order.products.map(function(p){return p.abbr;}).join(' ')).toLowerCase();
      if (searchable.indexOf(filterLower) === -1) continue;
    }
    if (order.zone) {
      if (!grouped[order.zone]) grouped[order.zone] = [];
      grouped[order.zone].push(order);
    } else {
      unassigned.push(order);
    }
  }

  var zoneOrder = ZONES.map(function(z) { return z.name; });
  var sortedZones = Object.keys(grouped).sort(function(a, b) {
    var ia = zoneOrder.indexOf(a);
    var ib = zoneOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  // Clear grid
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  for (var zi = 0; zi < sortedZones.length; zi++) {
    var zoneName = sortedZones[zi];
    var zoneOrders = grouped[zoneName];
    var zone = ZONES.find(function(z) { return z.name === zoneName; });
    grid.appendChild(renderZoneCard(zoneName, zoneOrders, zone ? zone.color : '#666', false));
  }

  if (unassigned.length > 0) {
    grid.appendChild(renderZoneCard('NON ASSEGNATI', unassigned, '#f87171', true));
  }

  updateHeaderStats();
  attachDragListeners();
}

function renderZoneCard(zoneName, zoneOrders, color, isUnassigned) {
  var productTotals = {};
  var totalItems = 0;
  for (var i = 0; i < zoneOrders.length; i++) {
    for (var j = 0; j < zoneOrders[i].products.length; j++) {
      var p = zoneOrders[i].products[j];
      if (!productTotals[p.abbr]) productTotals[p.abbr] = 0;
      productTotals[p.abbr] += p.quantity;
      totalItems += p.quantity;
    }
  }

  var card = createEl('div', { className: 'zone-card' + (isUnassigned ? ' unassigned-zone' : ''), 'data-zone': zoneName });

  // Header
  var header = createEl('div', { className: 'zone-header', onClick: function() { toggleZone(this); } });
  header.appendChild(createEl('div', { className: 'zone-color', style: { background: color } }));
  header.appendChild(createEl('div', { className: 'zone-name', textContent: zoneName }));
  header.appendChild(createEl('div', { className: 'zone-badge', textContent: zoneOrders.length + ' consegne' }));
  header.appendChild(createEl('span', { className: 'chevron', textContent: '\u25BC' }));
  card.appendChild(header);

  // Summary
  var summary = createEl('div', { className: 'zone-summary' });
  var stopItem = createEl('span', { className: 'zone-summary-item' });
  stopItem.appendChild(createEl('strong', {}, String(zoneOrders.length)));
  stopItem.appendChild(document.createTextNode(' stop'));
  summary.appendChild(stopItem);

  var piecesItem = createEl('span', { className: 'zone-summary-item' });
  piecesItem.appendChild(createEl('strong', {}, String(totalItems)));
  piecesItem.appendChild(document.createTextNode(' pezzi totali'));
  summary.appendChild(piecesItem);

  Object.keys(productTotals).forEach(function(name) {
    var item = createEl('span', { className: 'zone-summary-item' });
    item.appendChild(createEl('strong', {}, String(productTotals[name])));
    item.appendChild(document.createTextNode(' ' + name));
    summary.appendChild(item);
  });
  card.appendChild(summary);

  // Orders
  var ordersContainer = createEl('div', { className: 'zone-orders' });
  for (var oi = 0; oi < zoneOrders.length; oi++) {
    ordersContainer.appendChild(renderOrderRow(zoneOrders[oi], zoneName));
  }
  card.appendChild(ordersContainer);

  return card;
}

function renderOrderRow(order, zoneName) {
  var row = createEl('div', { className: 'order-row', draggable: 'true', 'data-order-id': order.id, 'data-zone': zoneName });

  // Column 1: Customer + notes
  var col1 = createEl('div');
  col1.appendChild(createEl('div', { className: 'order-customer', title: order.customer, textContent: order.customer }));
  var noteText = order.instructions || order.note;
  if (noteText) {
    col1.appendChild(createEl('div', { className: 'order-notes', textContent: noteText }));
  }
  row.appendChild(col1);

  // Column 2: Products
  var col2 = createEl('div', { className: 'order-products' });
  for (var pi = 0; pi < order.products.length; pi++) {
    var prod = order.products[pi];
    col2.appendChild(createEl('span', { className: 'product-tag', textContent: prod.abbr + ' x' + prod.quantity }));
  }
  row.appendChild(col2);

  // Column 3: Address
  row.appendChild(createEl('div', { className: 'order-address', title: order.address, textContent: order.address }));

  // Column 4: Amount
  if (order.isNP) {
    row.appendChild(createEl('div', { className: 'order-amount np', textContent: 'NP' }));
  } else {
    var amountEl = createEl('div', { className: 'order-amount' });
    amountEl.textContent = '\u20AC' + order.total.toFixed(2);
    row.appendChild(amountEl);
  }

  return row;
}

function updateHeaderStats() {
  var stats = document.getElementById('headerStats');
  while (stats.firstChild) stats.removeChild(stats.firstChild);

  var totalOrders = orders.length;
  var assignedOrders = orders.filter(function(o) { return o.zone; }).length;
  var npOrders = orders.filter(function(o) { return o.isNP; }).length;
  var totalPieces = orders.reduce(function(sum, o) { return sum + o.products.reduce(function(s, p) { return s + p.quantity; }, 0); }, 0);
  var zonesSet = {};
  orders.forEach(function(o) { if (o.zone) zonesSet[o.zone] = true; });
  var zonesCount = Object.keys(zonesSet).length;

  var items = [
    [totalOrders, 'ordini'],
    [assignedOrders, 'assegnati'],
    [zonesCount, 'zone'],
    [totalPieces, 'pezzi'],
    [npOrders, 'NP']
  ];

  items.forEach(function(item) {
    var stat = createEl('div', { className: 'header-stat' });
    stat.appendChild(createEl('strong', {}, String(item[0])));
    stat.appendChild(document.createTextNode(' ' + item[1]));
    stats.appendChild(stat);
  });
}

var draggedOrderId = null;

function attachDragListeners() {
  document.querySelectorAll('.order-row').forEach(function(row) {
    row.addEventListener('dragstart', function(e) {
      draggedOrderId = e.currentTarget.getAttribute('data-order-id');
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function(e) {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.zone-card').forEach(function(c) { c.classList.remove('drag-target'); });
    });
  });

  document.querySelectorAll('.zone-card').forEach(function(card) {
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-target');
    });
    card.addEventListener('dragleave', function() {
      card.classList.remove('drag-target');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      card.classList.remove('drag-target');
      var targetZone = card.getAttribute('data-zone');
      if (!draggedOrderId || !targetZone) return;

      var order = orders.find(function(o) { return o.id === draggedOrderId; });
      if (order) {
        var oldZone = order.zone || 'NON ASSEGNATI';
        order.zone = targetZone === 'NON ASSEGNATI' ? null : targetZone;
        render(document.getElementById('searchInput').value);
        showToast(order.customer + ' spostato da ' + oldZone + ' a ' + targetZone);
      }
      draggedOrderId = null;
    });
  });
}

    'var map = L.map("map").setView([45.464, 9.19], 12);' +
    'L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"OSM"}).addTo(map);' +
    zonePolygonsJS + '\n' + markers +
    '<\/script></body></html>';

  var blob = new Blob([mapHTML], { type: 'text/html' });
  var blobUrl = URL.createObjectURL(blob);

  var iframe = document.createElement('iframe');
  iframe.src = blobUrl;
  iframe.style.width = '100%';
  iframe.style.height = '100%';
  iframe.style.border = 'none';

  while (container.firstChild) container.removeChild(container.firstChild);
  container.appendChild(iframe);
}

function exportCSV() {
  var csv = 'Zona;Cliente;Prodotti;Quantita;Indirizzo;Importo;Note\n';
  var sorted = orders.slice().sort(function(a, b) { return (a.zone || 'ZZZ').localeCompare(b.zone || 'ZZZ'); });
  for (var i = 0; i < sorted.length; i++) {
    var o = sorted[i];
    var prods = o.products.map(function(p) { return p.abbr + ' x' + p.quantity; }).join(', ');
    var qty = o.products.reduce(function(s, p) { return s + p.quantity; }, 0);
    var amount = o.isNP ? 'NP' : o.total.toFixed(2);
    csv += (o.zone || 'N/A') + ';' + o.customer + ';' + prods + ';' + qty + ';' + o.address + ';' + amount + ';' + (o.instructions || o.note) + '\n';
  }
  var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'giri_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// FILE UPLOAD & PROCESSING
// ============================================================
var uploadBox = document.getElementById('uploadBox');
var fileInput = document.getElementById('fileInput');

uploadBox.addEventListener('click', function() { fileInput.click(); });
uploadBox.addEventListener('dragover', function(e) { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', function() { uploadBox.classList.remove('dragover'); });
uploadBox.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadBox.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener('change', function(e) {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

function processFile(file) {
  file.text().then(function(text) {
    orders = parseCSV(text);

    if (orders.length === 0) {
      showToast('Nessun ordine trovato nel file');
      return;
    }

    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('mainView').classList.add('active');

    var overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('active');

    var total = orders.length;
    var idx = 0;

    function processNext() {
      if (idx >= orders.length) {
        overlay.classList.remove('active');
        render();
        showToast(orders.length + ' ordini caricati, ' + orders.filter(function(o){return o.zone;}).length + ' assegnati a zone');
        return;
      }

      document.getElementById('loadingProgress').textContent = (idx + 1) + ' / ' + total;
      var currentOrder = orders[idx];
      var cacheKey = currentOrder.address.toLowerCase().trim();
      var wasCached = !!geocodeCache[cacheKey];

      geocodeAddress(currentOrder.address).then(function(result) {
        if (result) {
          currentOrder.lat = result.lat;
          currentOrder.lng = result.lng;
          currentOrder.zone = findZone(result.lng, result.lat);
        }
        idx++;
        if (wasCached) {
          processNext();
        } else {
          setTimeout(processNext, 1100);
        }
      });
    }

    processNext();
  });
}

// Search
document.getElementById('searchInput').addEventListener('input', function(e) {
  render(e.target.value);
});

// Button listeners
document.getElementById('btnMap').addEventListener('click', toggleMap);
document.getElementById('btnExpand').addEventListener('click', expandAll);
document.getElementById('btnCollapse').addEventListener('click', collapseAll);
document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
document.getElementById('btnExport').addEventListener('click', exportCSV);
document.getElementById('btnReset').addEventListener('click', resetApp);
