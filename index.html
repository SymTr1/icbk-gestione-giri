<title>ICBK - Gestione Giri Consegne</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6ef;
  --text2: #9298b0;
  --accent: #4f8cff;
  --accent2: #3a6fd8;
  --green: #34d399;
  --red: #f87171;
  --orange: #fb923c;
  --np-bg: #2d1f3d;
  --np-text: #c084fc;
  --sede-bg: #1a2733;
  --sede-color: #38bdf8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
.header h1 span { color: var(--accent); }
.header-stats { display: flex; gap: 16px; margin-left: auto; font-size: 12px; flex-wrap: wrap; }
.header-stat { display: flex; align-items: center; gap: 4px; color: var(--text2); white-space: nowrap; }
.header-stat strong { color: var(--text); font-size: 14px; }

.upload-area { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 40px; }
.upload-box { border: 2px dashed var(--border); border-radius: 16px; padding: 60px 80px; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface); }
.upload-box:hover, .upload-box.dragover { border-color: var(--accent); background: var(--surface2); }
.upload-box svg { width: 48px; height: 48px; color: var(--accent); margin-bottom: 16px; }
.upload-box h2 { font-size: 18px; margin-bottom: 8px; }
.upload-box p { color: var(--text2); font-size: 14px; }

.main { display: none; }
.main.active { display: block; }

.tabs {
  display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; position: sticky; top: 49px; z-index: 90;
}
.tab {
  padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all .15s; user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.toolbar {
  display: flex; gap: 10px; padding: 12px 20px; flex-wrap: wrap; align-items: center;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.toolbar input[type="text"] {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 12px; width: 240px;
}
.btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.map-wrapper { height: 500px; position: relative; }
#mapConsegne, #mapZone { width: 100%; height: 100%; }

/* ZONE SECTIONS */
.zone-table-header {
  background: var(--surface); padding: 10px 20px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.zone-table-header:hover { background: var(--surface2); }
.zone-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.zone-title { font-weight: 600; font-size: 14px; }
.zone-badge { background: var(--surface2); padding: 2px 10px; border-radius: 12px; font-size: 11px; color: var(--text2); }
.zone-totals-inline { margin-left: auto; display: flex; gap: 12px; font-size: 12px; color: var(--text2); }
.zone-totals-inline strong { color: var(--text); }
.chevron { transition: transform .2s; font-size: 14px; color: var(--text2); margin-left: 8px; }
.zone-table-header.collapsed .chevron { transform: rotate(-90deg); }

.zone-product-totals {
  padding: 8px 20px; background: rgba(79,140,255,0.04); border-bottom: 1px solid var(--border);
  display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text2);
}
.zone-product-totals strong { color: var(--text); margin-right: 2px; }
.zone-table-content.collapsed { display: none; }

/* Sede zone styling */
.zone-section.sede-zone .zone-table-header { background: var(--sede-bg); }
.zone-section.sede-zone .zone-dot { background: var(--sede-color) !important; }
.zone-section.sede-zone .zone-title { color: var(--sede-color); }

/* Unassigned */
.zone-section.unassigned .zone-table-header { background: rgba(248,113,113,0.08); }

/* TABLE - no fixed layout, let it breathe */
.orders-table { width: 100%; border-collapse: collapse; }
.orders-table th {
  background: var(--surface2); padding: 6px 10px; text-align: left; font-size: 11px;
  color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.orders-table td {
  padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
}
.orders-table tr:hover td { background: var(--surface2); }
.orders-table tr[draggable="true"] { cursor: grab; }
.orders-table tr.dragging td { opacity: 0.4; }

/* Specific column styles */
.col-num { width: 36px; text-align: center; color: var(--text2); }
.col-customer { min-width: 140px; max-width: 220px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-products { min-width: 200px; }
.col-address { min-width: 160px; max-width: 260px; color: var(--text2); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-notes { min-width: 100px; max-width: 200px; }
.col-amount { width: 80px; text-align: right; font-weight: 600; white-space: nowrap; }

.product-tag {
  display: inline-block; background: var(--surface2); padding: 2px 6px; border-radius: 3px;
  margin: 1px 3px 1px 0; font-size: 11px; white-space: nowrap; line-height: 1.4;
}
.notes-text { font-size: 11px; color: var(--orange); font-style: italic; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-badge {
  display: inline-block; background: var(--np-bg); color: var(--np-text);
  padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}

.zone-section.drag-target .zone-table-header { background: rgba(79,140,255,0.15); border-color: var(--accent); }

.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,17,23,0.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.loading-overlay.active { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text2); font-size: 14px; }
.loading-progress { color: var(--text); font-size: 13px; font-weight: 500; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; z-index: 300; transform: translateY(100px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.leaflet-popup-content { font-size: 12px; line-height: 1.5; }
.popup-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.popup-product { display: block; font-size: 11px; color: #555; padding: 1px 0; }
.popup-product b { color: #222; }
.popup-address { font-size: 11px; color: #888; margin-top: 6px; border-top: 1px solid #eee; padding-top: 4px; }
.popup-np { color: #9333ea; font-weight: 700; }
.popup-amount { font-weight: 600; margin-top: 4px; font-size: 13px; }

/* Debug banner */
.debug-banner { background: #7c2d12; color: #fed7aa; padding: 8px 20px; font-size: 12px; display: none; }
.debug-banner.show { display: block; }

@media print {
  .header, .tabs, .toolbar, .upload-area, .map-wrapper, .btn, .debug-banner { display: none !important; }
  .main, .tab-panel { display: block !important; }
  body { background: #fff; color: #000; font-size: 10px; }
  .orders-table th { background: #eee !important; color: #000 !important; }
  .orders-table td { color: #000 !important; border-color: #ccc !important; }
  .zone-table-header { background: #f5f5f5 !important; color: #000 !important; }
  .product-tag { background: #eee !important; color: #000 !important; }
}
</style>

function isSedeAddress(address) {
  var addr = address.toLowerCase().replace(/\s+/g, ' ').trim();
  // Via Teramo 9, Milano
  if (/via\s+teramo\s+9/i.test(addr)) return true;
  // Via Eugenio Montale 27 or 29, Opera
  if (/via\s+(eugenio\s+)?montale\s+(27|29)/i.test(addr)) return true;
  return false;
}

// ============================================================
// CSV PARSING
// ============================================================
function parseCSV(text) {
  // Split into logical lines (respecting quoted fields with newlines)
  var lines = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '"') inQuotes = !inQuotes;
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (current.trim()) lines.push(current);
      current = '';
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  if (current.trim()) lines.push(current);

  parseErrors = [];
  var results = [];

  for (var idx = 1; idx < lines.length; idx++) {
    var fields = splitCSVLine(lines[idx], ';');
    if (fields.length < 9) continue;

    var productsRaw = fields[2];
    var products = [];

    // Strategy 1: replace "" with " (CSV-style double-quote escaping)
    try {
      var attempt1 = productsRaw.replace(/""/g, '"');
      products = JSON.parse(attempt1);
    } catch(e1) {
      // Strategy 2: try raw
      try {
        products = JSON.parse(productsRaw);
      } catch(e2) {
        // Strategy 3: strip outer quotes then replace
        try {
          var attempt3 = productsRaw.replace(/^"|"$/g, '').replace(/""/g, '"');
          products = JSON.parse(attempt3);
        } catch(e3) {
          parseErrors.push('Riga ' + (idx+1) + ' (' + fields[1] + '): impossibile parsare prodotti');
          console.warn('Parse fail row', idx+1, fields[1], productsRaw.substring(0, 100));
        }
      }
    }

    // Filter out delivery service, abbreviate names
    var displayProducts = [];
    for (var pi = 0; pi < products.length; pi++) {
      var p = products[pi];
      if (p.name === 'servizio di consegna') continue;
      displayProducts.push({
        name: p.name,
        quantity: p.quantity,
        abbr: PRODUCT_ABBREVIATIONS[p.name] || p.name
      });
    }

    var customer = fields[1].trim();
    var address = (fields[4] || '').trim();
    var isNP = NP_CLIENTS.has(customer.toUpperCase());

    // Check if this is a "Ritiro in Ditta" address
    var forcedZone = isSedeAddress(address) ? SEDE_ZONE : null;

    results.push({
      id: fields[0],
      customer: customer,
      products: displayProducts,
      date: fields[3],
      address: address,
      contact: (fields[5] || '').trim(),
      instructions: (fields[6] || '').trim(),
      note: (fields[7] || '').trim(),
      total: parseFloat(fields[8]) || 0,
      isNP: isNP,
      zone: forcedZone,
      lat: null, lng: null,
      isSede: !!forcedZone
    });
  }
  return results;
}

function splitCSVLine(line, sep) {
  var fields = [], current = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (line[i+1] === '"') { current += '"'; i++; }
      else inQ = !inQ;
    }
    else if (ch === sep && !inQ) { fields.push(current); current = ''; }
    else current += ch;
  }
  fields.push(current);
  return fields;
}

// ============================================================
// GEOCODING
// ============================================================
function geocodeAddress(address) {
  var cacheKey = address.toLowerCase().trim();
  if (geocodeCache[cacheKey]) return Promise.resolve(geocodeCache[cacheKey]);

  var cleanAddr = address
    .replace(/\(MI\)/gi, 'Milano').replace(/\(Milano\)/gi, 'Milano')
    .replace(/, undefined/gi, '').replace(/undefined/gi, '')
    .replace(/Metropolitan City of Milan, Italy/gi, '')
    .trim().replace(/,\s*,/g, ',').replace(/,\s*$/,'');

  if (!/milano|milan/i.test(cleanAddr) && !/novegro|peschiera|melegnano|segrate|opera/i.test(cleanAddr))
    cleanAddr += ', Milano, Italy';
  else if (!/italy|italia/i.test(cleanAddr))
    cleanAddr += ', Italy';

  return fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(cleanAddr) + '&limit=1&countrycodes=it',
    { headers: { 'User-Agent': 'ICBK-DeliveryManager/1.0' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.length > 0) {
        var result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        geocodeCache[cacheKey] = result;
        try { localStorage.setItem('icbk_geocode_cache', JSON.stringify(geocodeCache)); } catch(e) {}
        return result;
      }
      return null;
    }).catch(function() { return null; });
}

function pointInPolygon(lng, lat, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i][0], yi = polygon[i][1], xj = polygon[j][0], yj = polygon[j][1];
    if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function findZone(lng, lat) {
  for (var i = 0; i < ZONES.length; i++) {
    if (pointInPolygon(lng, lat, ZONES[i].polygon)) return ZONES[i].name;
  }
  return null;
}

// ============================================================

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') e.className = attrs[k];
    else if (k === 'textContent') e.textContent = attrs[k];
    else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children) {
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  }
  return e;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function escTxt(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderZones(containerId, filter) {
  filter = (filter || '').toLowerCase();
  var container = document.getElementById(containerId);
  while (container.firstChild) container.removeChild(container.firstChild);

  var grouped = {};
  var unassigned = [];

  orders.forEach(function(order) {
    if (filter) {
      var s = (order.customer + ' ' + order.address + ' ' + order.products.map(function(p){return p.abbr;}).join(' ')).toLowerCase();
      if (s.indexOf(filter) === -1) return;
    }
    if (order.zone) {
      if (!grouped[order.zone]) grouped[order.zone] = [];
      grouped[order.zone].push(order);
    } else {
      unassigned.push(order);
    }
  });

  // Render "RITIRO IN DITTA" first if present
  if (grouped[SEDE_ZONE]) {
    container.appendChild(buildZoneSection(SEDE_ZONE, grouped[SEDE_ZONE], ZONE_COLORS[SEDE_ZONE], false, true));
    delete grouped[SEDE_ZONE];
  }

  // Then sorted zone order
  var zoneOrder = ZONES.map(function(z) { return z.name; });
  var sortedZones = Object.keys(grouped).sort(function(a, b) {
    return (zoneOrder.indexOf(a) === -1 ? 999 : zoneOrder.indexOf(a)) - (zoneOrder.indexOf(b) === -1 ? 999 : zoneOrder.indexOf(b));
  });

  sortedZones.forEach(function(zoneName) {
    container.appendChild(buildZoneSection(zoneName, grouped[zoneName], ZONE_COLORS[zoneName] || '#666', false, false));
  });

  if (unassigned.length > 0) {
    container.appendChild(buildZoneSection('NON ASSEGNATI', unassigned, '#f87171', true, false));
  }

  updateHeaderStats();
  attachDrag();
}

function buildZoneSection(zoneName, zoneOrders, color, isUnassigned, isSede) {
  var cssClass = 'zone-section';
  if (isUnassigned) cssClass += ' unassigned';
  if (isSede) cssClass += ' sede-zone';

  var section = el('div', { className: cssClass, 'data-zone': zoneName });

  // Compute product totals for this zone
  var productTotals = {};
  var totalItems = 0;
  zoneOrders.forEach(function(o) {
    o.products.forEach(function(p) {
      if (!productTotals[p.abbr]) productTotals[p.abbr] = 0;
      productTotals[p.abbr] += p.quantity;
      totalItems += p.quantity;
    });
  });

  // Header
  var header = el('div', { className: 'zone-table-header', onClick: function() {
    this.classList.toggle('collapsed');
    var next = this.nextElementSibling;
    while (next && next.classList.contains('zone-table-content')) {
      next.classList.toggle('collapsed');
      next = next.nextElementSibling;
    }
  }});
  header.appendChild(el('div', { className: 'zone-dot', style: { background: color } }));
  header.appendChild(el('span', { className: 'zone-title', textContent: zoneName }));
  header.appendChild(el('span', { className: 'zone-badge', textContent: zoneOrders.length + ' consegne' }));

  var totalsInline = el('div', { className: 'zone-totals-inline' });
  var ti = el('span');
  ti.appendChild(el('strong', {}, String(totalItems)));
  ti.appendChild(document.createTextNode(' pezzi'));
  totalsInline.appendChild(ti);
  header.appendChild(totalsInline);
  header.appendChild(el('span', { className: 'chevron', textContent: '\u25BC' }));
  section.appendChild(header);

  // Product breakdown bar
  var breakdownBar = el('div', { className: 'zone-product-totals zone-table-content' });
  var prodNames = Object.keys(productTotals);
  if (prodNames.length === 0) {
    breakdownBar.appendChild(el('span', { textContent: 'Nessun prodotto rilevato', style: { color: 'var(--red)' } }));
  }
  prodNames.forEach(function(name) {
    var item = el('span');
    item.appendChild(el('strong', {}, String(productTotals[name])));
    item.appendChild(document.createTextNode(' ' + name));
    breakdownBar.appendChild(item);
  });
  section.appendChild(breakdownBar);

  // Table
  var tableWrap = el('div', { className: 'zone-table-content' });
  var table = el('table', { className: 'orders-table' });

  var thead = el('thead');
  var headRow = el('tr');
  ['#', 'Cliente', 'Prodotti', 'Indirizzo', 'Note', 'Importo'].forEach(function(h) {
    var cls = '';
    if (h === '#') cls = 'col-num';
    if (h === 'Cliente') cls = 'col-customer';
    if (h === 'Prodotti') cls = 'col-products';
    if (h === 'Indirizzo') cls = 'col-address';
    if (h === 'Note') cls = 'col-notes';
    if (h === 'Importo') cls = 'col-amount';
    headRow.appendChild(el('th', { className: cls, textContent: h }));
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  var tbody = el('tbody');
  zoneOrders.forEach(function(order, idx) {
    var tr = el('tr', { draggable: 'true', 'data-order-id': order.id, 'data-zone': zoneName });

    // #
    tr.appendChild(el('td', { className: 'col-num', textContent: String(idx + 1) }));

    // Customer
    tr.appendChild(el('td', { className: 'col-customer', title: order.customer, textContent: order.customer }));

    // Products - this is the key column
    var prodTd = el('td', { className: 'col-products' });
    if (order.products.length === 0) {
      prodTd.appendChild(el('span', { style: { color: 'var(--red)', fontSize: '11px' } }, '(nessun prodotto)'));
    } else {
      order.products.forEach(function(p) {
        prodTd.appendChild(el('span', { className: 'product-tag', textContent: p.abbr + ' x' + p.quantity }));
      });
    }
    tr.appendChild(prodTd);

    // Address
    tr.appendChild(el('td', { className: 'col-address', title: order.address, textContent: order.address }));

    // Notes
    var noteTd = el('td', { className: 'col-notes' });
    var noteText = order.instructions || order.note;
    if (noteText) noteTd.appendChild(el('span', { className: 'notes-text', title: noteText, textContent: noteText }));
    tr.appendChild(noteTd);

    // Amount
    var amtTd = el('td', { className: 'col-amount' });
    if (order.isNP) {
      amtTd.appendChild(el('span', { className: 'np-badge', textContent: 'NP' }));
    } else {
      amtTd.textContent = '\u20AC' + order.total.toFixed(2);
    }
    tr.appendChild(amtTd);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  tableWrap.appendChild(table);
  section.appendChild(tableWrap);

  return section;
}

function updateHeaderStats() {
  var stats = document.getElementById('headerStats');
  while (stats.firstChild) stats.removeChild(stats.firstChild);
  var totalPieces = orders.reduce(function(s, o) { return s + o.products.reduce(function(ss, p) { return ss + p.quantity; }, 0); }, 0);
  var zonesSet = {};
  orders.forEach(function(o) { if (o.zone) zonesSet[o.zone] = true; });
  var sedeCount = orders.filter(function(o) { return o.zone === SEDE_ZONE; }).length;

  var items = [
    [orders.length, 'ordini'],
    [orders.filter(function(o){return o.zone && o.zone !== SEDE_ZONE;}).length, 'in consegna'],
    [sedeCount, 'ritiri sede'],
    [Object.keys(zonesSet).length, 'zone'],
    [totalPieces, 'pezzi'],
    [orders.filter(function(o){return o.isNP;}).length, 'NP']
  ];
  items.forEach(function(item) {
    var stat = el('div', { className: 'header-stat' });
    stat.appendChild(el('strong', {}, String(item[0])));
    stat.appendChild(document.createTextNode(' ' + item[1]));
    stats.appendChild(stat);
  });
}

function refreshMapMarkers(map, markersArray) {
  markersArray.forEach(function(m) { map.removeLayer(m); });
  markersArray.length = 0;
  orders.forEach(function(order) {
    if (!order.lat || !order.lng) return;
    var zoneColor = order.zone ? (ZONE_COLORS[order.zone] || '#4f8cff') : '#f87171';
    var marker = L.circleMarker([order.lat, order.lng], {
      radius: 7, color: '#fff', weight: 2, fillColor: zoneColor, fillOpacity: 0.9
    }).addTo(map);
    marker.bindPopup(buildPopupContent(order), { maxWidth: 300 });
    markersArray.push(marker);
  });
}

// ============================================================
// DRAG & DROP
// ============================================================
var draggedOrderId = null;

function attachDrag() {
  document.querySelectorAll('.orders-table tr[draggable]').forEach(function(row) {
    row.addEventListener('dragstart', function(e) {
      draggedOrderId = this.getAttribute('data-order-id');
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('.zone-section').forEach(function(s) { s.classList.remove('drag-target'); });
    });
  });
  document.querySelectorAll('.zone-section').forEach(function(section) {
    section.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; section.classList.add('drag-target'); });
    section.addEventListener('dragleave', function() { section.classList.remove('drag-target'); });
    section.addEventListener('drop', function(e) {
      e.preventDefault(); section.classList.remove('drag-target');
      var targetZone = section.getAttribute('data-zone');
      if (!draggedOrderId || !targetZone) return;
      var order = orders.find(function(o) { return o.id === draggedOrderId; });
      if (order) {
        var oldZone = order.zone || 'NON ASSEGNATI';
        order.zone = targetZone === 'NON ASSEGNATI' ? null : targetZone;
        order.isSede = (order.zone === SEDE_ZONE);
        renderAll();
        showToast(order.customer + ': ' + oldZone + ' \u2192 ' + targetZone);
      }
      draggedOrderId = null;
    });
  });
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  var filter = document.getElementById('searchInput').value;
  renderZones('zonesContainer', filter);
  renderZones('zonesContainerMap', filter);
  if (mapConsegne) refreshMapMarkers(mapConsegne, mapConsegneMarkers);
  if (mapZone) refreshMapMarkers(mapZone, mapZoneMarkers);
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById('panel-' + this.getAttribute('data-tab')).classList.add('active');
    if (this.getAttribute('data-tab') === 'mapConsegne') {
      initMapConsegne();
      setTimeout(function() { mapConsegne.invalidateSize(); refreshMapMarkers(mapConsegne, mapConsegneMarkers); }, 100);
    }
    if (this.getAttribute('data-tab') === 'mapZone') {
      initMapZone();
      setTimeout(function() { mapZone.invalidateSize(); refreshMapMarkers(mapZone, mapZoneMarkers); }, 100);
    }
  });
});

// ============================================================
// TOOLBAR
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() { renderAll(); });
document.getElementById('btnExpand').addEventListener('click', function() {
  document.querySelectorAll('.zone-table-content.collapsed').forEach(function(e) { e.classList.remove('collapsed'); });
  document.querySelectorAll('.zone-table-header.collapsed').forEach(function(e) { e.classList.remove('collapsed'); });
});
document.getElementById('btnCollapse').addEventListener('click', function() {
  document.querySelectorAll('.zone-table-content').forEach(function(e) { e.classList.add('collapsed'); });
  document.querySelectorAll('.zone-table-header').forEach(function(e) { e.classList.add('collapsed'); });
});
document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
document.getElementById('btnExport').addEventListener('click', function() {
  var csv = 'Zona;#;Cliente;Prodotti;Quantita;Indirizzo;Importo;Note\n';
  var sorted = orders.slice().sort(function(a, b) { return (a.zone || 'ZZZ').localeCompare(b.zone || 'ZZZ'); });
  var zoneIdx = {};
  sorted.forEach(function(o) {
    var z = o.zone || 'N/A';
    if (!zoneIdx[z]) zoneIdx[z] = 0;
    zoneIdx[z]++;
    var prods = o.products.map(function(p) { return p.abbr + ' x' + p.quantity; }).join(', ');
    var qty = o.products.reduce(function(s, p) { return s + p.quantity; }, 0);
    csv += z + ';' + zoneIdx[z] + ';' + o.customer + ';' + prods + ';' + qty + ';' + o.address + ';' + (o.isNP ? 'NP' : o.total.toFixed(2)) + ';' + (o.instructions || o.note) + '\n';
  });
  var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  var a = el('a', { href: URL.createObjectURL(blob), download: 'giri_' + new Date().toISOString().slice(0,10) + '.csv' });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});
document.getElementById('btnReset').addEventListener('click', function() {
  orders = []; parseErrors = [];
  document.getElementById('mainView').classList.remove('active');
  document.getElementById('uploadArea').style.display = '';
  var db = document.getElementById('debugBanner'); db.classList.remove('show'); db.textContent = '';
  if (mapConsegne) { mapConsegne.remove(); mapConsegne = null; }
  if (mapZone) { mapZone.remove(); mapZone = null; }
  mapConsegneMarkers = []; mapZoneMarkers = [];
});

// ============================================================
// FILE UPLOAD
// ============================================================
var uploadBox = document.getElementById('uploadBox');
var fileInput = document.getElementById('fileInput');
uploadBox.addEventListener('click', function() { fileInput.click(); });
uploadBox.addEventListener('dragover', function(e) { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', function() { uploadBox.classList.remove('dragover'); });
uploadBox.addEventListener('drop', function(e) {
  e.preventDefault(); uploadBox.classList.remove('dragover');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  file.text().then(function(text) {
    orders = parseCSV(text);
    if (orders.length === 0) { showToast('Nessun ordine trovato'); return; }

    // Show debug info if there were parse errors
    if (parseErrors.length > 0) {
      var db = document.getElementById('debugBanner');
      db.textContent = 'Attenzione: ' + parseErrors.length + ' ordini con errori di parsing prodotti. Dettagli in console (F12).';
      db.classList.add('show');
    }

    // Log parsing summary
    var withProducts = orders.filter(function(o) { return o.products.length > 0; }).length;
    var sedeOrders = orders.filter(function(o) { return o.isSede; }).length;
    console.log('Parsing completato:', orders.length, 'ordini,', withProducts, 'con prodotti,', sedeOrders, 'ritiri in sede');
    if (orders.length > 0) {
      console.log('Esempio primo ordine:', JSON.stringify(orders[0], null, 2));
    }

    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('mainView').classList.add('active');
    var overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('active');

    var total = orders.length;
    var idx = 0;

    function next() {
      if (idx >= orders.length) {
        overlay.classList.remove('active');
        renderAll();
        var assigned = orders.filter(function(o){return o.zone;}).length;
        var sede = orders.filter(function(o){return o.isSede;}).length;
        showToast(orders.length + ' ordini | ' + assigned + ' assegnati | ' + sede + ' ritiri sede');
        return;
      }
      document.getElementById('loadingProgress').textContent = (idx + 1) + ' / ' + total;
      var o = orders[idx];

      // Skip geocoding for sede orders (already assigned)
      if (o.isSede) {
        idx++;
        next();
        return;
      }

      var wasCached = !!geocodeCache[o.address.toLowerCase().trim()];
      geocodeAddress(o.address).then(function(result) {
        if (result) { o.lat = result.lat; o.lng = result.lng; o.zone = findZone(result.lng, result.lat); }
        idx++;
        wasCached ? next() : setTimeout(next, 1100);
      });
    }
    next();
  });
}
</script>
