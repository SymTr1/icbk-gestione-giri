<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICBK - Gestione Giri Consegne</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
:root{--bg:#f5f5f5;--surface:#ffffff;--surface2:#fafafa;--border:#e0e0e0;--text:#1a1a1a;--text2:#666666;--accent:#2563eb;--accent2:#1d4ed8;--green:#16a34a;--red:#dc2626;--orange:#d97706;--np-bg:#f3e8ff;--np-text:#7c3aed;--sede-color:#0284c7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header h1{font-size:18px;font-weight:700;white-space:nowrap;}.header h1 span{color:var(--accent);}
.header-stats{display:flex;gap:14px;margin-left:auto;font-size:12px;flex-wrap:wrap;}
.header-stat{display:flex;align-items:center;gap:4px;color:var(--text2);white-space:nowrap;}.header-stat strong{color:var(--text);font-size:14px;}
.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px;}
.upload-box{border:2px dashed var(--border);border-radius:16px;padding:60px 80px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);}
.upload-box:hover,.upload-box.dragover{border-color:var(--accent);background:var(--surface2);}
.upload-box svg{width:48px;height:48px;color:var(--accent);margin-bottom:16px;}
.upload-box h2{font-size:18px;margin-bottom:8px;}.upload-box p{color:var(--text2);font-size:14px;}
.main{display:none;}.main.active{display:block;}
.tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:45px;z-index:90;}
.tab{padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;user-select:none;}.tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.toolbar{display:flex;gap:10px;padding:10px 20px;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);}
.toolbar input[type="text"]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;width:240px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;}.btn:hover{border-color:var(--accent);}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}.btn-danger{background:var(--red);border-color:var(--red);color:#fff;}.btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.map-wrapper{height:500px;position:relative;}
#mapConsegne,#mapZone{width:100%;height:100%;}
.dual-view{display:none;}
.dual-mode .dual-view{display:block;}
.dual-mode .single-view{display:none;}
.split-container{display:flex;height:calc(100vh - 200px);min-height:500px;}
.split-left,.split-right{flex:1;overflow-y:auto;border-right:2px solid #d0d0d0;}.split-right{border-right:none;border-left:2px solid #d0d0d0;}
.split-label{background:#e8f0fe;color:#2563eb;text-align:center;padding:6px;font-size:12px;font-weight:600;position:sticky;top:0;z-index:5;border-bottom:1px solid #d0d0d0;}
/* Zone filter bar */
.zone-filter-bar{display:flex;gap:0;padding:0 12px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:nowrap;position:sticky;top:0;z-index:8;}
/* Filter bar freezes inside scrollable containers (dual view split panels) */
.zone-filter-btn{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:500;color:#666;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.zone-filter-btn:hover{color:#333;background:#f5f5f5;}
.zone-filter-btn.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600;}
.zone-filter-btn .zf-count{font-size:11px;color:#999;margin-left:2px;}
.zone-filter-btn.active .zf-count{color:#2563eb;}
/* Zone header - grid layout for alignment */
.zone-table-header{background:#fafafa;padding:6px 14px;display:grid;grid-template-columns:14px 130px 70px 1fr 90px 100px 90px 20px;align-items:center;gap:6px;border-bottom:1px solid #e0e0e0;border-top:1px solid #e0e0e0;cursor:pointer;user-select:none;min-height:36px;}
.zone-table-header:hover{background:#f0f0f0;}
.zone-dot{width:12px;height:12px;border-radius:3px;}
.zone-title{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.zone-badge{background:#eee;padding:2px 8px;border-radius:12px;font-size:11px;color:#666;text-align:center;white-space:nowrap;}
.zone-products{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.zone-products .zp-item{background:#e8e8e8;padding:2px 7px;border-radius:4px;color:#1a1a1a;font-weight:600;white-space:nowrap;font-size:12px;}
.zone-colli{font-weight:700;font-size:12px;color:#333;text-align:right;white-space:nowrap;}
.zone-kg{font-weight:700;font-size:13px;color:var(--accent);text-align:right;white-space:nowrap;}
.zone-poli{font-size:12px;color:#666;text-align:right;white-space:nowrap;}
.zone-kg.warn{color:var(--orange);}
/* Custom zone styling */
.zone-section.custom-zone .zone-table-header{background:rgba(124,58,237,0.05);}
.zone-section.custom-zone .zone-title{color:#7c3aed;}
.btn-remove-zone{font-size:10px;color:#999;cursor:pointer;border:none;background:none;padding:2px;}.btn-remove-zone:hover{color:var(--red);}
/* Add zone modal */
.add-zone-row{display:flex;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid #e0e0e0;align-items:center;}
.add-zone-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;}
.chevron{transition:transform .2s;font-size:14px;color:var(--text2);margin-left:8px;flex-shrink:0;}
.zone-table-header.collapsed .chevron{transform:rotate(-90deg);}
.zone-table-content.collapsed{display:none;}
.zone-section.sede-zone .zone-table-header{background:rgba(2,132,199,0.08);}.zone-section.sede-zone .zone-title{color:var(--sede-color);}
.zone-section.unassigned .zone-table-header{background:rgba(220,38,38,0.06);}
.zone-section.drag-target .zone-table-header{background:rgba(37,99,235,0.12);border-color:var(--accent);}
.orders-table{width:100%;border-collapse:collapse;table-layout:auto;}
.orders-table.resized{table-layout:fixed;}
.orders-table th{background:#f0f0f0;padding:5px 8px;text-align:left;font-size:11px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #e0e0e0;border-right:1px solid #e0e0e0;white-space:nowrap;position:sticky;top:0;z-index:2;cursor:pointer;user-select:none;position:relative;}
.orders-table th:last-child{border-right:none;}
.orders-table th:hover{background:#e8e8e8;}
.orders-table th .sort-arrow{font-size:10px;margin-left:3px;color:#aaa;}
.orders-table th .sort-arrow.active{color:#2563eb;}
.col-resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:3;}
.col-resize-handle:hover,.col-resize-handle.dragging{background:rgba(37,99,235,0.3);}
.orders-table td{padding:5px 8px;border-bottom:1px solid #e0e0e0;border-right:1px solid #eee;vertical-align:top;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.orders-table td:last-child{border-right:none;}
.orders-table tbody tr:nth-child(even) td{background:#fafafa;}
.orders-table tr:hover td{background:#f0f7ff;}
.orders-table tr[draggable="true"]{cursor:grab;}.orders-table tr.dragging td{opacity:.4;}
.col-num{width:28px;text-align:center;color:#999;border-right:2px solid #ccc;}
.col-customer{min-width:120px;max-width:200px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-products{min-width:180px;}
.col-address{min-width:130px;max-width:220px;color:var(--text2);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-notes{min-width:60px;max-width:140px;}
.col-amount{width:70px;text-align:right;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums;}
.col-actions{width:52px;text-align:center;white-space:nowrap;}
.col-assign{width:160px;}
.zone-select{width:100%;background:#fff;border:1px solid #ddd;color:#333;padding:2px 4px;border-radius:4px;font-size:11px;cursor:pointer;}
.zone-select:hover{border-color:var(--accent);}
.zone-select:focus{outline:none;border-color:var(--accent);}
.product-item{display:inline;font-size:13px;white-space:nowrap;font-weight:500;}
.product-bracket{color:var(--accent);font-weight:700;}.product-plus{color:var(--text2);margin:0 2px;}
.notes-text{font-size:10px;color:var(--orange);font-style:italic;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-badge{display:inline-block;background:var(--np-bg);color:var(--np-text);padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.split-badge{display:inline-block;background:rgba(217,119,6,0.12);color:var(--orange);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px;}
.btn-split{padding:2px 6px;font-size:10px;border-radius:4px;cursor:pointer;background:#fff;border:1px solid #ddd;color:#999;}.btn-split:hover{border-color:#d97706;color:#d97706;}

/* Split Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:95vw;max-width:1200px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.modal-header h3{font-size:15px;flex:1;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.split-product-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:nowrap;}
.split-product-name{font-weight:600;min-width:90px;max-width:120px;font-size:13px;flex-shrink:0;}
.split-product-total{color:var(--text2);min-width:60px;font-size:12px;flex-shrink:0;}
.split-slots{display:flex;gap:6px;flex-wrap:nowrap;flex:1;overflow-x:auto;}
.split-slot{display:flex;align-items:center;gap:4px;background:#f5f5f5;padding:4px 8px;border-radius:6px;flex-shrink:0;border:1px solid #e0e0e0;}
.split-slot label{font-size:10px;color:var(--text2);white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
.split-slot input{width:60px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:12px;text-align:center;}
.split-slot input.error{border-color:var(--red);}
.split-remaining{font-size:11px;min-width:70px;text-align:right;flex-shrink:0;}
.split-remaining.ok{color:var(--green);}.split-remaining.err{color:var(--red);}
.split-zone-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.split-zone-chip{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;}
.split-zone-chip.selected{border-color:var(--accent);background:rgba(37,99,235,0.1);color:var(--accent);}
.split-amount-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:2px solid var(--accent);margin-top:8px;flex-wrap:nowrap;}
.split-amount-row .split-product-name{color:var(--accent);}

/* Resolve panel */
.resolve-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250;overflow-y:auto;padding:20px;}
.resolve-overlay.active{display:block;}
.resolve-panel{max-width:1100px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.resolve-header{padding:16px 20px;background:rgba(220,38,38,0.06);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.resolve-header h2{font-size:16px;font-weight:700;}.resolve-header .resolve-count{color:var(--red);font-weight:700;}
.resolve-skip{margin-left:auto;}
.resolve-item{display:flex;border-bottom:1px solid var(--border);min-height:220px;}
.resolve-item.resolved{opacity:.5;background:rgba(52,211,153,0.05);}
.resolve-info{flex:1;padding:14px 20px;display:flex;flex-direction:column;gap:8px;}
.resolve-customer{font-weight:700;font-size:14px;}.resolve-address{color:var(--text2);font-size:13px;}.resolve-products{font-size:12px;color:var(--text2);}
.resolve-search{display:flex;gap:8px;margin-top:4px;}
.resolve-search input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;}
.resolve-result{font-size:11px;color:var(--green);margin-top:2px;min-height:16px;}
.resolve-map{width:400px;min-width:400px;position:relative;}
.resolve-map-inner{width:100%;height:100%;}
.resolve-hint{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;text-align:center;pointer-events:none;z-index:10;}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;}.loading-overlay.active{display:flex;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:#333;font-size:14px;}.loading-progress{color:#1a1a1a;font-size:13px;font-weight:500;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s;}.toast.show{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:#aaa;}
.leaflet-popup-content{font-size:12px;line-height:1.5;}.popup-title{font-weight:700;font-size:13px;margin-bottom:4px;}.popup-product{display:block;font-size:12px;color:#555;padding:1px 0;}.popup-product b{color:#222;}.popup-address{font-size:11px;color:#888;margin-top:6px;border-top:1px solid #eee;padding-top:4px;}.popup-np{color:#9333ea;font-weight:700;}.popup-amount{font-weight:600;margin-top:4px;font-size:13px;}.popup-zone{font-size:11px;color:#666;margin-top:2px;}
@media print{.header,.tabs,.toolbar,.upload-area,.map-wrapper,.btn,.split-label,.resolve-overlay,.modal-overlay,.col-actions{display:none !important;}.main,.tab-panel{display:block !important;}.split-container{display:block!important;height:auto!important;}.split-left,.split-right{border:none!important;}body{background:#fff;color:#000;font-size:10px;}.orders-table th{background:#eee !important;color:#000 !important;}.orders-table td{color:#000 !important;border-color:#ccc !important;}.zone-table-header{background:#f5f5f5 !important;color:#000 !important;}.product-bracket{color:#333 !important;}}
</style>
</head>
<body>
<div class="header"><h1><span>ICBK</span> Gestione Giri</h1><div class="header-stats" id="headerStats"></div></div>
<div class="upload-area" id="uploadArea"><div class="upload-box" id="uploadBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg><h2>Carica il file CSV degli ordini</h2><p>Trascina qui o clicca per selezionare</p></div><input type="file" id="fileInput" accept=".csv" style="display:none"></div>
<div class="resolve-overlay" id="resolveOverlay"><div class="resolve-panel"><div class="resolve-header"><h2>Indirizzi non trovati: <span class="resolve-count" id="resolveCount">0</span></h2><p style="color:var(--text2);font-size:12px;margin-left:12px">Cerca o clicca sulla mappa</p><button class="btn btn-primary resolve-skip" id="resolveSkipBtn">Continua</button></div><div id="resolveList"></div></div></div>

<!-- SPLIT MODAL -->
<div class="modal-overlay" id="splitModal">
  <div class="modal">
    <div class="modal-header"><h3 id="splitTitle">Divisione Multipla</h3><button class="btn" id="splitCloseBtn">Annulla</button></div>
    <div class="modal-body" id="splitBody"></div>
    <div class="modal-footer"><span id="splitError" style="color:var(--red);font-size:12px;flex:1"></span><button class="btn btn-primary" id="splitConfirmBtn">Conferma Divisione</button></div>
  </div>
</div>

<div class="main" id="mainView">
  <div class="tabs"><div class="tab active" data-tab="giri">Giri per Zona</div><div class="tab" data-tab="mapConsegne">Mappa Consegne</div><div class="tab" data-tab="mapZone">Mappa + Zone</div></div>
  <div class="toolbar"><input type="text" id="searchInput" placeholder="Cerca cliente, indirizzo, prodotto..."><button class="btn" id="btnAddZone">+ Zona</button><button class="btn" id="btnDual">Doppia Vista</button><button class="btn" id="btnExpand">Espandi Tutti</button><button class="btn" id="btnCollapse">Comprimi Tutti</button><button class="btn" id="btnPrint">Stampa</button><button class="btn" id="btnExport">Esporta Excel</button><button class="btn btn-primary" id="btnReset">Nuovo Caricamento</button></div>
  <div class="tab-panel active" id="panel-giri">
    <div class="single-view" id="giriSingle"><div class="zone-filter-bar" id="zfGiri"></div><div id="zonesContainer"></div></div>
    <div class="dual-view" id="giriDual"><div class="split-container"><div class="split-left"><div class="zone-filter-bar" id="zfGiriL"></div><div id="giriDualLeft"></div></div><div class="split-right"><div class="zone-filter-bar" id="zfGiriR"></div><div id="giriDualRight"></div></div></div></div>
  </div>
  <div class="tab-panel" id="panel-mapConsegne">
    <div class="map-wrapper"><div id="mapConsegne"></div></div>
    <div class="single-view" id="map1Single"><div class="zone-filter-bar" id="zfMap1"></div><div id="map1Container"></div></div>
    <div class="dual-view" id="map1Dual"><div class="split-container"><div class="split-left"><div class="zone-filter-bar" id="zfMap1L"></div><div id="map1DualLeft"></div></div><div class="split-right"><div class="zone-filter-bar" id="zfMap1R"></div><div id="map1DualRight"></div></div></div></div>
  </div>
  <div class="tab-panel" id="panel-mapZone">
    <div class="map-wrapper"><div id="mapZone"></div></div>
    <div class="single-view" id="mzSingle"><div class="zone-filter-bar" id="zfMZ"></div><div id="mzContainer"></div></div>
    <div class="dual-view" id="mzDual"><div class="split-container"><div class="split-left"><div class="zone-filter-bar" id="zfMZL"></div><div id="mzDualLeft"></div></div><div class="split-right"><div class="zone-filter-bar" id="zfMZR"></div><div id="mzDualRight"></div></div></div></div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">Geocoding indirizzi...</div><div class="loading-progress" id="loadingProgress"></div></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================

function parseCSV(text){var lines=[],cur='',inQ=false;for(var i=0;i<text.length;i++){var ch=text[i];if(ch==='"')inQ=!inQ;if((ch==='\n'||ch==='\r')&&!inQ){if(cur.trim())lines.push(cur);cur='';if(ch==='\r'&&text[i+1]==='\n')i++;}else cur+=ch;}if(cur.trim())lines.push(cur);var results=[];for(var idx=1;idx<lines.length;idx++){var f=splitCSV(lines[idx],';');if(f.length<9)continue;var products=[];try{products=JSON.parse(f[2].replace(/""/g,'"'));}catch(e1){try{products=JSON.parse(f[2]);}catch(e2){try{products=JSON.parse(f[2].replace(/^"|"$/g,'').replace(/""/g,'"'));}catch(e3){}}}var dp=[];for(var pi=0;pi<products.length;pi++){var p=products[pi];if(SERVICE_PRODUCTS.has(p.name))continue;dp.push({name:p.name,quantity:p.quantity,abbr:PRODUCT_ABBREVIATIONS[p.name]||p.name,step:PRODUCT_STEPS[p.name]||1,colli:Math.ceil(p.quantity/(PRODUCT_STEPS[p.name]||1)),isPoli:POLIBOX_PRODUCTS.has(p.name),isClear:CLEAR_PRODUCTS.has(p.name)});}var customer=f[1].trim(),address=(f[4]||'').trim(),forcedZone=isSedeAddress(address)?SEDE_ZONE:null;results.push({id:f[0],customer:customer,products:dp,date:f[3],address:address,contact:(f[5]||'').trim(),instructions:(f[6]||'').trim(),note:(f[7]||'').trim(),total:parseFloat(f[8])||0,isNP:NP_CLIENTS.has(customer.toUpperCase()),zone:forcedZone,lat:null,lng:null,isSede:!!forcedZone,splitPart:null,splitTotal:null,originalId:null});}return results;}
function splitCSV(line,sep){var f=[],cur='',inQ=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===sep&&!inQ){f.push(cur);cur='';}else cur+=ch;}f.push(cur);return f;}

function geocodeNominatim(address){var cl=cleanAddress(address);if(!/milano|milan/i.test(cl)&&!/novegro|peschiera|melegnano|segrate|opera/i.test(cl))cl+=', Milano, Italy';else if(!/italy|italia/i.test(cl))cl+=', Italy';return fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(cl)+'&limit=1&countrycodes=it',{headers:{'User-Agent':'ICBK/1.0'}}).then(function(r){return r.json();}).then(function(d){return d&&d.length>0?{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}:null;}).catch(function(){return null;});}

function pointInPolygon(lng,lat,poly){var ins=false;for(var i=0,j=poly.length-1;i<poly.length;j=i++){var xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))ins=!ins;}return ins;}

  customZones.forEach(function(cz){allChipZones.push(cz);});
  allChipZones.forEach(function(zn){
    var chip=el('div',{className:'split-zone-chip',textContent:zn,'data-zone':zn,onClick:function(){
      if(this.classList.contains('selected')){this.classList.remove('selected');selectedZones=selectedZones.filter(function(z){return z!==zn;});}
      else{this.classList.add('selected');selectedZones.push(zn);}
      rebuildSplitSlots(order,selectedZones);
    }});
    chips.appendChild(chip);
  });
  body.appendChild(chips);

  // Product rows container
  body.appendChild(el('div',{id:'splitProductRows'}));

  document.getElementById('splitModal').classList.add('active');
}

function rebuildSplitSlots(order,selectedZones){
  var container=document.getElementById('splitProductRows');
  while(container.firstChild)container.removeChild(container.firstChild);
  if(selectedZones.length<2){container.appendChild(el('p',{style:{color:'var(--text2)',fontSize:'12px'}},'Seleziona almeno 2 zone'));return;}

  order.products.forEach(function(p){
    var row=el('div',{className:'split-product-row'});
    row.appendChild(el('div',{className:'split-product-name',textContent:p.abbr}));
    row.appendChild(el('div',{className:'split-product-total',textContent:'Tot: '+p.quantity}));
    var slots=el('div',{className:'split-slots'});
    selectedZones.forEach(function(zn){
      var slot=el('div',{className:'split-slot'});
      slot.appendChild(el('label',{textContent:zn}));
      slot.appendChild(el('input',{type:'number',min:'0',max:String(p.quantity),value:'0','data-product':p.abbr,'data-zone':zn,onInput:function(){validateSplit(order);}}));
      slots.appendChild(slot);
    });
    row.appendChild(slots);
    row.appendChild(el('div',{className:'split-remaining',id:'splitRem_'+p.abbr.replace(/[^a-zA-Z0-9]/g,'_')}));
    container.appendChild(row);
  });

  // Amount row (only if not NP)
  if(!order.isNP&&order.total>0){
    var amtRow=el('div',{className:'split-product-row split-amount-row'});
    amtRow.appendChild(el('div',{className:'split-product-name',textContent:'IMPORTO \u20AC'}));
    amtRow.appendChild(el('div',{className:'split-product-total',textContent:'Tot: '+order.total.toFixed(2)}));
    var amtSlots=el('div',{className:'split-slots'});
    selectedZones.forEach(function(zn){
      var slot=el('div',{className:'split-slot'});
      slot.appendChild(el('label',{textContent:zn}));
      slot.appendChild(el('input',{type:'number',min:'0',step:'0.01',max:String(order.total),value:'0','data-product':'__AMOUNT__','data-zone':zn,onInput:function(){validateSplit(order);}}));
      amtSlots.appendChild(slot);
    });
    amtRow.appendChild(amtSlots);
    amtRow.appendChild(el('div',{className:'split-remaining',id:'splitRem___AMOUNT__'}));
    container.appendChild(amtRow);
  }

  validateSplit(order);
}

function validateSplit(order){
  var allOk=true;
  // Validate products
  order.products.forEach(function(p){
    var key=p.abbr.replace(/[^a-zA-Z0-9]/g,'_');
    var inputs=document.querySelectorAll('#splitProductRows input[data-product="'+p.abbr+'"]');
    var sum=0;
    inputs.forEach(function(inp){sum+=parseInt(inp.value)||0;inp.classList.remove('error');});
    var rem=document.getElementById('splitRem_'+key);
    if(rem){
      var diff=p.quantity-sum;
      if(diff===0){rem.textContent='\u2713';rem.className='split-remaining ok';}
      else if(diff>0){rem.textContent='-'+diff;rem.className='split-remaining err';allOk=false;}
      else{rem.textContent='+'+Math.abs(diff);rem.className='split-remaining err';allOk=false;inputs.forEach(function(inp){inp.classList.add('error');});}
    }
  });
  // Validate amount
  if(!order.isNP&&order.total>0){
    var amtInputs=document.querySelectorAll('#splitProductRows input[data-product="__AMOUNT__"]');
    var amtSum=0;
    amtInputs.forEach(function(inp){amtSum+=parseFloat(inp.value)||0;inp.classList.remove('error');});
    var rem=document.getElementById('splitRem___AMOUNT__');
    if(rem){
      var diff=Math.round((order.total-amtSum)*100)/100;
      if(Math.abs(diff)<0.01){rem.textContent='\u2713';rem.className='split-remaining ok';}
      else if(diff>0){rem.textContent='-\u20AC'+diff.toFixed(2);rem.className='split-remaining err';allOk=false;}
      else{rem.textContent='+\u20AC'+Math.abs(diff).toFixed(2);rem.className='split-remaining err';allOk=false;amtInputs.forEach(function(inp){inp.classList.add('error');});}
    }
  }
  document.getElementById('splitError').textContent=allOk?'':'Tutti i totali devono quadrare';
  return allOk;
}

document.getElementById('splitConfirmBtn').addEventListener('click',function(){
  var order=orders.find(function(o){return o.id===splitOrderId;});
  if(!order)return;
  if(!validateSplit(order)){showToast('I totali non quadrano!');return;}

  // Collect zone allocations for products
  var zoneAllocs={},zoneAmounts={};
  document.querySelectorAll('#splitProductRows input[type="number"]').forEach(function(inp){
    var zn=inp.getAttribute('data-zone'),prod=inp.getAttribute('data-product');
    if(prod==='__AMOUNT__'){
      var amt=parseFloat(inp.value)||0;
      if(amt>0)zoneAmounts[zn]=amt;
    }else{
      var qty=parseInt(inp.value)||0;
      if(qty<=0)return;
      if(!zoneAllocs[zn])zoneAllocs[zn]={};
      zoneAllocs[zn][prod]=qty;
    }
  });

  var zoneNames=Object.keys(zoneAllocs);
  if(zoneNames.length<2){showToast('Serve almeno 2 zone con quantita');return;}

  // Save original for undo/re-split
  var origId=order.originalId||order.id;
  splitOriginals[origId]=JSON.parse(JSON.stringify(order));

  var origIdx=orders.indexOf(order);
  orders.splice(origIdx,1);

  var total=zoneNames.length;
  zoneNames.forEach(function(zn,i){
    var newProducts=[];
    order.products.forEach(function(p){
      var qty=zoneAllocs[zn]&&zoneAllocs[zn][p.abbr]?zoneAllocs[zn][p.abbr]:0;
      if(qty>0)newProducts.push({name:p.name,quantity:qty,abbr:p.abbr,step:p.step,colli:Math.ceil(qty/p.step),isPoli:p.isPoli,isClear:p.isClear});
    });
    var splitAmount=zoneAmounts[zn]||0;
    var newOrder={id:origId+'_split_'+(i+1),customer:order.customer,products:newProducts,date:order.date,address:order.address,contact:order.contact,instructions:order.instructions,note:order.note,total:splitAmount,isNP:order.isNP,zone:zn,lat:order.lat,lng:order.lng,isSede:false,splitPart:i+1,splitTotal:total,originalId:origId};
    orders.push(newOrder);
  });

  document.getElementById('splitModal').classList.remove('active');
  renderAll();
  showToast(order.customer+' diviso in '+total+' parti');
});

document.getElementById('splitCloseBtn').addEventListener('click',function(){document.getElementById('splitModal').classList.remove('active');});

function undoSplit(originalId){
  var orig=splitOriginals[originalId];
  if(!orig)return;
  // Remove all split parts
  orders=orders.filter(function(o){return o.originalId!==originalId;});
  // Restore original
  orders.push(JSON.parse(JSON.stringify(orig)));
  delete splitOriginals[originalId];
  renderAll();
  showToast(orig.customer+': divisione annullata');
}

function reSplit(originalId){
  // Reconstruct the original from saved data, remove split parts, open modal
  var orig=splitOriginals[originalId];
  if(!orig)return;
  orders=orders.filter(function(o){return o.originalId!==originalId;});
  var restored=JSON.parse(JSON.stringify(orig));
  orders.push(restored);
  renderAll();
  // Open split modal on restored order
  setTimeout(function(){openSplitModal(restored.id);},100);
}

function getZoneStats(){
  var stats={};
  // Init all zones with 0
  ZONE_DISPLAY_ORDER.forEach(function(zn){if(!stats[zn])stats[zn]={count:0,kg:0};});
  stats[SEDE_ZONE]={count:0,kg:0};stats['NON ASSEGNATI']={count:0,kg:0};
  orders.forEach(function(o){
    var z=o.zone||'NON ASSEGNATI';
    if(!stats[z])stats[z]={count:0,kg:0};
    stats[z].count++;
    o.products.forEach(function(p){if(!p.isPoli)stats[z].kg+=p.colli*10;});
  });
  return stats;
}

function buildZoneSelect(order){
  var stats=getZoneStats();
  var select=document.createElement('select');
  select.className='zone-select';
  // Current zone option
  var currentZone=order.zone||'';
  // Build options: all zones in display order
  var optNone=document.createElement('option');
  optNone.value='';optNone.textContent='-- Non assegnato ('+stats['NON ASSEGNATI'].count+')';
  if(!order.zone)optNone.selected=true;
  select.appendChild(optNone);

  var seen={};
  ZONE_DISPLAY_ORDER.forEach(function(zn){
    if(seen[zn])return;seen[zn]=true;
    var s=stats[zn]||{count:0,kg:0};
    var opt=document.createElement('option');
    opt.value=zn;
    opt.textContent=zn+' ('+s.count+' cons, '+s.kg+'kg)';
    if(currentZone===zn)opt.selected=true;
    select.appendChild(opt);
  });
  // Custom zones
  customZones.forEach(function(czn){
    var cs=stats[czn]||{count:0,kg:0};
    var optC=document.createElement('option');
    optC.value=czn;optC.textContent=czn+' ('+cs.count+' cons, '+cs.kg+'kg)';
    if(currentZone===czn)optC.selected=true;
    select.appendChild(optC);
  });
  // SEDE
  var ss=stats[SEDE_ZONE]||{count:0,kg:0};
  var optS=document.createElement('option');
  optS.value=SEDE_ZONE;optS.textContent='RITIRO IN DITTA ('+ss.count+' cons, '+ss.kg+'kg)';
  if(currentZone===SEDE_ZONE)optS.selected=true;
  select.appendChild(optS);

  select.addEventListener('change',function(){
    var newZone=this.value;
    var old=order.zone||'NON ASSEGNATI';
    order.zone=newZone||null;
    order.isSede=(order.zone===SEDE_ZONE);
    renderAll();
    showToast(order.customer+': '+old+' \u2192 '+(newZone||'NON ASSEGNATI'));
  });
  return select;
}

// ============================================================
// TABLE SORT + COLUMN RESIZE
// ============================================================
function initTableFeatures(table){
  var ths=table.querySelectorAll('th');
  // Sort
  ths.forEach(function(th,colIdx){
    // Add sort arrow
    var arrow=document.createElement('span');
    arrow.className='sort-arrow';
    arrow.textContent='\u2195';
    th.appendChild(arrow);

    th.addEventListener('click',function(e){
      // Don't sort if clicking resize handle
      if(e.target.classList.contains('col-resize-handle'))return;
      var tbody=table.querySelector('tbody');
      var rows=Array.from(tbody.querySelectorAll('tr'));
      var asc=th.getAttribute('data-sort')!=='asc';
      // Reset all arrows
      ths.forEach(function(h){h.removeAttribute('data-sort');var a=h.querySelector('.sort-arrow');if(a){a.textContent='\u2195';a.classList.remove('active');}});
      th.setAttribute('data-sort',asc?'asc':'desc');
      arrow.textContent=asc?'\u25B2':'\u25BC';
      arrow.classList.add('active');

      rows.sort(function(a,b){
        var cellA=a.cells[colIdx];var cellB=b.cells[colIdx];
        if(!cellA||!cellB)return 0;
        var valA=cellA.textContent.trim();var valB=cellB.textContent.trim();
        // Try numeric sort
        var numA=parseFloat(valA.replace(/[^\d.,-]/g,'').replace(',','.'));
        var numB=parseFloat(valB.replace(/[^\d.,-]/g,'').replace(',','.'));
        if(!isNaN(numA)&&!isNaN(numB))return asc?numA-numB:numB-numA;
        // String sort
        return asc?valA.localeCompare(valB,'it'):valB.localeCompare(valA,'it');
      });
      rows.forEach(function(r){tbody.appendChild(r);});
      // Reapply zebra
      rows.forEach(function(r,i){Array.from(r.cells).forEach(function(td){td.style.background=(i%2===1)?'#fafafa':'';});});
    });

    // Resize handle (not on last column)
    if(colIdx<ths.length-1){
      var handle=document.createElement('div');
      handle.className='col-resize-handle';
      th.appendChild(handle);
      handle.addEventListener('mousedown',function(e){
        e.preventDefault();e.stopPropagation();
        var startX=e.pageX;
        var startW=th.offsetWidth;
        var nextTh=ths[colIdx+1];
        var nextStartW=nextTh?nextTh.offsetWidth:0;
        handle.classList.add('dragging');
        table.classList.add('resized');
        // Set explicit widths on all ths if first time
        if(!table.hasAttribute('data-resized')){
          table.setAttribute('data-resized','1');
          ths.forEach(function(h){h.style.width=h.offsetWidth+'px';});
        }
        function onMove(ev){
          var diff=ev.pageX-startX;
          var newW=Math.max(30,startW+diff);
          th.style.width=newW+'px';
          if(nextTh){nextTh.style.width=Math.max(30,nextStartW-diff)+'px';}
        }
        function onUp(){
          handle.classList.remove('dragging');
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
        }
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });
    }
  });
}

function updateHeaderStats(){var stats=document.getElementById('headerStats');while(stats.firstChild)stats.removeChild(stats.firstChild);var tc=0,tk=0,tp=0;orders.forEach(function(o){o.products.forEach(function(p){if(p.isPoli)tp+=p.quantity;else{tc+=p.colli;tk+=p.colli*10;}});});[[orders.length,'ordini'],[orders.filter(function(o){return o.zone&&o.zone!==SEDE_ZONE;}).length,'consegne'],[orders.filter(function(o){return o.isSede;}).length,'ritiri sede'],[tc,'colli ('+tk+'kg)'],[tp,'polibox'],[orders.filter(function(o){return o.isNP;}).length,'NP']].forEach(function(item){var s=el('div',{className:'header-stat'});s.appendChild(el('strong',{},String(item[0])));s.appendChild(document.createTextNode(' '+item[1]));stats.appendChild(s);});}

function buildPopupContent(o){var l='<div class="popup-title">'+escTxt(o.customer)+(o.splitPart?' <small>'+o.splitPart+'/'+o.splitTotal+'</small>':'')+'</div><div>';o.products.forEach(function(p){l+='<span class="popup-product"><b>['+p.quantity+' x '+escTxt(p.abbr)+']</b></span>';});l+='</div><div class="popup-address">'+escTxt(o.address)+'</div>';if(o.zone)l+='<div class="popup-zone">Zona: '+escTxt(o.zone)+'</div>';l+=o.isNP?'<div class="popup-amount popup-np">NP</div>':'<div class="popup-amount">\u20AC'+o.total.toFixed(2)+'</div>';return l;}
function initMapConsegne(){if(mapConsegne)return;mapConsegne=L.map('mapConsegne',{scrollWheelZoom:false,zoomControl:true}).setView([45.464,9.19],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(mapConsegne);mapConsegne.on('click',function(){mapConsegne.scrollWheelZoom.enable();});mapConsegne.on('mouseout',function(){mapConsegne.scrollWheelZoom.disable();});}
function initMapZone(){if(mapZone)return;mapZone=L.map('mapZone',{scrollWheelZoom:false,zoomControl:true}).setView([45.464,9.19],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(mapZone);mapZone.on('click',function(){mapZone.scrollWheelZoom.enable();});mapZone.on('mouseout',function(){mapZone.scrollWheelZoom.disable();});ZONES.forEach(function(z){L.polygon(z.polygon.map(function(p){return[p[1],p[0]];}),{color:z.color,weight:2,fillOpacity:.15}).addTo(mapZone).bindTooltip(z.name,{permanent:false,direction:'center'});});}
function refreshMapMarkers(map,arr,zoneFilter){
  zoneFilter=zoneFilter||'TUTTI';
  arr.forEach(function(m){map.removeLayer(m);});arr.length=0;
  orders.forEach(function(o){
    if(!o.lat||!o.lng)return;
    if(zoneFilter!=='TUTTI'){
      if(zoneFilter==='NON ASSEGNATI'){if(o.zone)return;}
      else{if(o.zone!==zoneFilter)return;}
    }
    var zc=o.zone?(ZONE_COLORS[o.zone]||'#4f8cff'):'#f87171';
    var m=L.circleMarker([o.lat,o.lng],{radius:7,color:'#fff',weight:2,fillColor:zc,fillOpacity:.9}).addTo(map);
    m.bindPopup(buildPopupContent(o),{maxWidth:300});arr.push(m);
  });
}

  else{fb('zfMap1','map1');renderZones('map1Container',f,filters.map1);}
  // Mappa + Zone
  if(dualMode){
    fb('zfMZL','mzL');fb('zfMZR','mzR');

  updateHeaderStats();

}

function exportExcel(){
  var wb=XLSX.utils.book_new();
  var HDRS=['Cliente','Prodotti','Indirizzo','Note','Importo','Zona'];
  var colW=[{wch:26},{wch:36},{wch:30},{wch:20},{wch:9},{wch:15}];
  var numCols=HDRS.length;

  // Styles
  var sBorder={top:{style:'thin',color:{rgb:'AAAAAA'}},bottom:{style:'thin',color:{rgb:'AAAAAA'}},left:{style:'thin',color:{rgb:'AAAAAA'}},right:{style:'thin',color:{rgb:'AAAAAA'}}};
  var sBorderBold={top:{style:'medium',color:{rgb:'333333'}},bottom:{style:'medium',color:{rgb:'333333'}},left:{style:'medium',color:{rgb:'333333'}},right:{style:'medium',color:{rgb:'333333'}}};
  var sTitle={font:{bold:true,sz:14,color:{rgb:'000000'}},alignment:{horizontal:'left'}};
  var sCargo={font:{bold:true,sz:11,color:{rgb:'000000'}},border:{bottom:{style:'medium',color:{rgb:'000000'}}},alignment:{horizontal:'left'}};
  var sHeader={font:{bold:true,sz:10,color:{rgb:'000000'}},border:sBorderBold,alignment:{horizontal:'left'}};
  var sHeaderR={font:{bold:true,sz:10,color:{rgb:'000000'}},border:sBorderBold,alignment:{horizontal:'right'}};
  var sCell={font:{sz:10,color:{rgb:'1a1a1a'}},border:sBorder,alignment:{horizontal:'left',vertical:'center',wrapText:false}};
  var sCellR={font:{sz:10,color:{rgb:'1a1a1a'}},border:sBorder,alignment:{horizontal:'right',vertical:'center'}};
  var sNP={font:{bold:true,sz:10,color:{rgb:'7C3AED'}},border:sBorder,alignment:{horizontal:'right',vertical:'center'}};

  var grouped={},unassigned=[];
  orders.forEach(function(o){if(o.zone){if(!grouped[o.zone])grouped[o.zone]=[];grouped[o.zone].push(o);}else unassigned.push(o);});
  var zoneList=[];var seen={};
  ZONE_DISPLAY_ORDER.forEach(function(zn){if(seen[zn])return;seen[zn]=true;if(grouped[zn])zoneList.push(zn);});
  customZones.forEach(function(czn){if(!seen[czn]&&grouped[czn]){seen[czn]=true;zoneList.push(czn);}});
  Object.keys(grouped).forEach(function(zn){if(!seen[zn]&&zn!==SEDE_ZONE)zoneList.push(zn);});
  if(unassigned.length>0)zoneList.push('NON ASSEGNATI');
  if(grouped[SEDE_ZONE])zoneList.push(SEDE_ZONE);

  function cargoText(orderList,zoneName){
    var cargo=calcCargo(orderList);var parts=[zoneName+' \u2014 '+orderList.length+' consegne'];
    var pba={};orderList.forEach(function(o){o.products.forEach(function(p){if(!pba[p.abbr])pba[p.abbr]={qty:0,colli:0,isClear:p.isClear,isPoli:p.isPoli};pba[p.abbr].qty+=p.quantity;pba[p.abbr].colli+=p.colli;});});
    Object.keys(pba).forEach(function(a){var pt=pba[a];if(pt.isPoli)return;if(pt.isClear)parts.push(pt.colli+' cf. '+a);else parts.push(pt.qty+' x '+a);});
    parts.push('Tot '+cargo.totalKg+' kg');if(cargo.totalPoli>0)parts.push(cargo.totalPoli+' Polibox');
    return parts.join('  |  ');
  }

  function applyStyles(ws,rows,startRow){
    // rows is the data array, startRow is 0-based row where data starts in the sheet
    var r=startRow;
    for(var ri=0;ri<rows.length;ri++){
      var rowData=rows[ri];
      if(!rowData._type){for(var ci=0;ci<numCols;ci++){var addr=XLSX.utils.encode_cell({r:r,c:ci});if(!ws[addr])continue;}}
      if(rowData._type==='cargo'){
        // Merge across all columns and style
        ws['!merges']=ws['!merges']||[];
        ws['!merges'].push({s:{r:r,c:0},e:{r:r,c:numCols-1}});
        var ca=XLSX.utils.encode_cell({r:r,c:0});if(ws[ca])ws[ca].s=sCargo;
      }else if(rowData._type==='header'){
        for(var ci=0;ci<numCols;ci++){var a=XLSX.utils.encode_cell({r:r,c:ci});if(ws[a])ws[a].s=(ci===4)?sHeaderR:sHeader;}
      }else if(rowData._type==='data'){
        for(var ci=0;ci<numCols;ci++){
          var a=XLSX.utils.encode_cell({r:r,c:ci});if(!ws[a])continue;
          if(ci===4&&rowData._isNP){ws[a].s=sNP;}
          else if(ci===4){ws[a].s=sCellR;}
          else{ws[a].s=sCell;}
        }
      }else if(rowData._type==='title'){
        ws['!merges']=ws['!merges']||[];
        ws['!merges'].push({s:{r:r,c:0},e:{r:r,c:numCols-1}});
        var ta=XLSX.utils.encode_cell({r:r,c:0});if(ws[ta])ws[ta].s=sTitle;
      }
      r++;
    }
  }

  function buildSheet(orderList,zoneName){
    var meta=[];var aoa=[];
    // Cargo line
    var ct=cargoText(orderList,zoneName);
    aoa.push([ct,'','','','','']);meta.push({_type:'cargo'});
    // Empty row
    aoa.push(['','','','','','']);meta.push({_type:'empty'});
    // Headers
    aoa.push(HDRS.slice());meta.push({_type:'header'});
    // Data
    var dataIdx=0;
    orderList.forEach(function(o){
      var name=o.customer;if(o.splitPart)name=o.splitPart+'/'+o.splitTotal+' '+name;
      var prods=o.products.map(function(p){return'['+p.quantity+' x '+p.abbr+']';}).join(' + ');
      var importo=o.isNP?'NP':o.total;
      aoa.push([name,prods,o.address,o.instructions||o.note,importo,o.zone||'N/A']);
      meta.push({_type:'data',_isNP:o.isNP});
      dataIdx++;
    });
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=colW;
    ws['!pageSetup']={paperSize:9,orientation:'landscape',fitToWidth:1,fitToHeight:0};
    ws['!margins']={left:0.3,right:0.3,top:0.4,bottom:0.4,header:0.2,footer:0.2};
    applyStyles(ws,meta,0);
    return ws;
  }

  // Sheet "TUTTI" - all zones grouped
  var allAoa=[];var allMeta=[];
  allAoa.push(['RIEPILOGO GIRI \u2014 '+new Date().toLocaleDateString('it-IT'),'','','','','']);
  allMeta.push({_type:'title'});
  allAoa.push(['','','','','','']);allMeta.push({_type:'empty'});

  zoneList.forEach(function(zn){
    var list=zn==='NON ASSEGNATI'?unassigned:grouped[zn];
    if(!list||!list.length)return;
    allAoa.push([cargoText(list,zn),'','','','','']);allMeta.push({_type:'cargo'});
    allAoa.push(HDRS.slice());allMeta.push({_type:'header'});
    var di=0;
    list.forEach(function(o){
      var name=o.customer;if(o.splitPart)name=o.splitPart+'/'+o.splitTotal+' '+name;
      var prods=o.products.map(function(p){return'['+p.quantity+' x '+p.abbr+']';}).join(' + ');
      allAoa.push([name,prods,o.address,o.instructions||o.note,o.isNP?'NP':o.total,o.zone||'N/A']);
      allMeta.push({_type:'data',_isNP:o.isNP});di++;
    });
    allAoa.push(['','','','','','']);allMeta.push({_type:'empty'});
  });
  var wsTutti=XLSX.utils.aoa_to_sheet(allAoa);
  wsTutti['!cols']=colW;
  wsTutti['!pageSetup']={paperSize:9,orientation:'landscape',fitToWidth:1,fitToHeight:0};
  wsTutti['!margins']={left:0.3,right:0.3,top:0.4,bottom:0.4,header:0.2,footer:0.2};
  applyStyles(wsTutti,allMeta,0);
  XLSX.utils.book_append_sheet(wb,wsTutti,'TUTTI');

  // Per-zone sheets
  zoneList.forEach(function(zn){
    var list=zn==='NON ASSEGNATI'?unassigned:grouped[zn];
    if(!list||!list.length)return;
    XLSX.utils.book_append_sheet(wb,buildSheet(list,zn),zn.substring(0,31));
  });

  XLSX.writeFile(wb,'giri_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('Excel esportato');
}
document.getElementById('btnReset').addEventListener('click',function(){orders=[];customZones=[];splitOriginals={};document.getElementById('mainView').classList.remove('active');document.getElementById('uploadArea').style.display='';if(mapConsegne){mapConsegne.remove();mapConsegne=null;}if(mapZone){mapZone.remove();mapZone=null;}mapConsegneMarkers=[];mapZoneMarkers=[];});

// Custom zones
document.getElementById('btnAddZone').addEventListener('click',function(){
  var name=prompt('Nome della nuova zona (es. Driver A):');
  if(!name||!name.trim())return;
  name=name.trim().toUpperCase();
  if(ZONE_COLORS[name]||customZones.indexOf(name)!==-1){showToast('Zona "'+name+'" esiste già');return;}
  customZones.push(name);
  // Assign a color
  var customColors=['#9333ea','#e11d48','#0891b2','#65a30d','#c2410c','#4338ca','#b91c1c','#0d9488','#a16207','#6d28d9'];
  ZONE_COLORS[name]=customColors[(customZones.length-1)%customColors.length];
  renderAll();
  showToast('Zona "'+name+'" aggiunta');
});

function removeCustomZone(name){
  // Move orders back to unassigned
  orders.forEach(function(o){if(o.zone===name){o.zone=null;}});
  customZones=customZones.filter(function(cz){return cz!==name;});
  delete ZONE_COLORS[name];
  renderAll();
  showToast('Zona "'+name+'" rimossa');
}

uploadBox.addEventListener('click',function(){fileInput.click();});uploadBox.addEventListener('dragover',function(e){e.preventDefault();uploadBox.classList.add('dragover');});uploadBox.addEventListener('dragleave',function(){uploadBox.classList.remove('dragover');});uploadBox.addEventListener('drop',function(e){e.preventDefault();uploadBox.classList.remove('dragover');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});fileInput.addEventListener('change',function(e){if(e.target.files[0])processFile(e.target.files[0]);});

function processFile(file){file.text().then(function(text){orders=parseCSV(text);if(orders.length===0){showToast('Nessun ordine trovato');return;}document.getElementById('uploadArea').style.display='none';var overlay=document.getElementById('loadingOverlay');overlay.classList.add('active');var total=orders.length,idx=0,failedGeo=[];function nextOrder(){if(idx>=orders.length){if(failedGeo.length>0){document.getElementById('loadingText').textContent='Google Maps fallback...';var gi=0;function nextG(){if(gi>=failedGeo.length){overlay.classList.remove('active');document.getElementById('loadingText').textContent='Geocoding indirizzi...';showResolvePanel(orders.filter(function(o){return!o.lat&&!o.isSede;}));return;}document.getElementById('loadingProgress').textContent=(gi+1)+'/'+failedGeo.length+' (Google)';var o=failedGeo[gi];geocodeGoogle(o.address).then(function(r){if(r){o.lat=r.lat;o.lng=r.lng;o.zone=findZone(r.lng,r.lat);geocodeCache[o.address.toLowerCase().trim()]=r;try{localStorage.setItem('icbk_geocode_cache',JSON.stringify(geocodeCache));}catch(e){}}gi++;setTimeout(nextG,200);});}nextG();}else{overlay.classList.remove('active');showResolvePanel(orders.filter(function(o){return!o.lat&&!o.isSede;}));}return;}document.getElementById('loadingProgress').textContent=(idx+1)+'/'+total;var o=orders[idx];if(o.isSede){idx++;nextOrder();return;}var ck=o.address.toLowerCase().trim();if(geocodeCache[ck]){var cached=geocodeCache[ck];o.lat=cached.lat;o.lng=cached.lng;o.zone=findZone(cached.lng,cached.lat);idx++;nextOrder();return;}geocodeNominatim(o.address).then(function(r){if(r){o.lat=r.lat;o.lng=r.lng;o.zone=findZone(r.lng,r.lat);geocodeCache[ck]=r;try{localStorage.setItem('icbk_geocode_cache',JSON.stringify(geocodeCache));}catch(e){}}else failedGeo.push(o);idx++;setTimeout(nextOrder,1100);});}nextOrder();});}
